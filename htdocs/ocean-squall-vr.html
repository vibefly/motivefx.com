<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Squall VR | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        #storm-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }

        .storm-controls {
            position: fixed;
            bottom: 24px;
            left: 16px;
            z-index: 4;
        }

        #sound-toggle {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.45);
            color: #e9f7ff;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: var(--font-primary);
            font-weight: 600;
            backdrop-filter: blur(6px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        #sound-toggle.is-on {
            background: rgba(60, 120, 255, 0.35);
            border-color: rgba(120, 180, 255, 0.6);
        }

        #sound-toggle:hover {
            background: rgba(20, 50, 80, 0.55);
            border-color: rgba(143, 232, 255, 0.7);
            transform: translateY(-1px);
        }

        #sound-toggle:focus-visible {
            outline: 2px solid rgba(143, 232, 255, 0.7);
            outline-offset: 2px;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Ocean Squall VR</p>
        <p class="subtitle">An immersive VR squall with rain, lightning bursts, and rolling ocean swells.</p>
    </div>
    <div class="storm-controls">
        <button id="sound-toggle" type="button">Enable Storm Sound</button>
    </div>

    <canvas id="mountain-canvas"></canvas>
    <canvas id="storm-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById('mountain-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            const defaultPixelRatio = Math.min(1.25, window.devicePixelRatio);
            renderer.setPixelRatio(defaultPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x060b14, 1);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType("local-floor");
            renderer.xr.addEventListener("sessionstart", () => {
                renderer.setPixelRatio(1);
            });
            renderer.xr.addEventListener("sessionend", () => {
                renderer.setPixelRatio(defaultPixelRatio);
                clearBolts3d();
            });

            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x060b14, 22, 170);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
            const cameraRig = new THREE.Group();
            cameraRig.add(camera);
            scene.add(cameraRig);

            const ambient = new THREE.AmbientLight(0x5fa2ff, 0.4);
            scene.add(ambient);

            const keyLight = new THREE.DirectionalLight(0x9fd6ff, 1.0);
            keyLight.position.set(20, 30, 10);
            scene.add(keyLight);

            const rimLight = new THREE.DirectionalLight(0x2c6a9f, 0.35);
            rimLight.position.set(-20, 18, -40);
            scene.add(rimLight);

            const terrainGroup = new THREE.Group();
            scene.add(terrainGroup);

            const tileCount = 3;
            const tileLength = 120;
            const width = 220;
            const depth = 120;
            const segmentsX = 80;
            const segmentsZ = 56;

            const baseGeometry = new THREE.PlaneGeometry(width, depth, segmentsX, segmentsZ);
            baseGeometry.rotateX(-Math.PI / 2);

            const terrainMaterial = new THREE.MeshStandardMaterial({
                color: 0x0a2a45,
                roughness: 0.6,
                metalness: 0.2,
                flatShading: false,
                vertexColors: true
            });
            const wireMaterial = new THREE.LineBasicMaterial({
                color: 0x4fd6ff,
                transparent: true,
                opacity: 0.6
            });

            const tiles = [];
            for (let i = 0; i < tileCount; i++) {
                const meshGeom = baseGeometry.clone();
                const wireGeom = baseGeometry.clone();
                const colorAttr = new Float32Array(meshGeom.attributes.position.count * 3);
                meshGeom.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));
                const gridIndex = [];
                const vertsX = segmentsX + 1;
                const vertsZ = segmentsZ + 1;
                for (let z = 0; z < vertsZ; z++) {
                    for (let x = 0; x < segmentsX; x++) {
                        const a = z * vertsX + x;
                        gridIndex.push(a, a + 1);
                    }
                }
                for (let z = 0; z < segmentsZ; z++) {
                    for (let x = 0; x < vertsX; x++) {
                        const a = z * vertsX + x;
                        gridIndex.push(a, a + vertsX);
                    }
                }
                wireGeom.setIndex(gridIndex);
                const mesh = new THREE.Mesh(meshGeom, terrainMaterial.clone());
                const wire = new THREE.LineSegments(wireGeom, wireMaterial.clone());
                mesh.position.z = -i * tileLength;
                wire.position.z = -i * tileLength;
                terrainGroup.add(mesh);
                terrainGroup.add(wire);
                tiles.push({ mesh, wire });
            }

            function triWave(value) {
                return (2 / Math.PI) * Math.asin(Math.sin(value));
            }

            function smoothstep(t) {
                return t * t * (3 - 2 * t);
            }

            function hash2(x, z) {
                const s = Math.sin(x * 127.1 + z * 311.7 + noiseSeed) * 43758.5453;
                return s - Math.floor(s);
            }

            function valueNoise(x, z) {
                const xi = Math.floor(x);
                const zi = Math.floor(z);
                const xf = x - xi;
                const zf = z - zi;
                const u = smoothstep(xf);
                const v = smoothstep(zf);

                const n00 = hash2(xi, zi);
                const n10 = hash2(xi + 1, zi);
                const n01 = hash2(xi, zi + 1);
                const n11 = hash2(xi + 1, zi + 1);
                const nx0 = n00 + (n10 - n00) * u;
                const nx1 = n01 + (n11 - n01) * u;
                return nx0 + (nx1 - nx0) * v;
            }

            function heightAt(x, z, t) {
                const zTravel = z - t * speed * 0.6;
                const primary = Math.sin(zTravel * 0.03 + t * 0.7);
                const steep = Math.sign(primary) * Math.pow(Math.abs(primary), 2.3);
                const swell = steep * 7.4;
                const swellCross = Math.sin(x * 0.025 + t * 0.5) * 3.1;
                const windChop = Math.sin((x + zTravel) * 0.035 + t * 0.9) * 4.2;
                const curl = Math.sin(zTravel * 0.06 + t * 1.2) * 2.6;
                const noise = (valueNoise(x * noiseScale, zTravel * noiseScale) - 0.5) * noiseAmp;
                const edge = Math.min(1, Math.abs(x) / (width * 0.5));
                const edgeFalloff = 1 - Math.pow(edge, 1.4);
                return (swell + swellCross + windChop + curl + noise) * (0.6 + edgeFalloff * 0.4);
            }

            const clock = new THREE.Clock();
            let offset = 0;
            const speed = 32;
            const travelLength = tileCount * tileLength;
            let camX = 0;
            let camY = 16;
            let prevCamX = 0;
            let prevCamY = 16;
            let rollSmooth = 0;
            const noiseSeed = Math.random() * 1000;
            const noiseScale = 0.1;
            const noiseAmp = 2.4;
            let normalFrame = 0;

            const stormCanvas = document.getElementById('storm-canvas');
            const stormCtx = stormCanvas.getContext('2d');
            const rainDrops = [];
            const rainCount = 420;
            const lightningBolts = [];
            const lightningBolts3d = [];
            let boltSprite = null;
            let lightningFlash = 0;
            let lightningNext = 0.8 + Math.random() * 4.2;
            let lightningBurst = 0;
            let lightningBurstGap = 0;
            const baseAmbient = ambient.intensity;
            const baseKey = keyLight.intensity;
            const lightningGroup = new THREE.Group();
            scene.add(lightningGroup);
            const lightningMaterial = new THREE.LineBasicMaterial({
                color: 0xe6f7ff,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const soundToggle = document.getElementById('sound-toggle');
            let audioCtx = null;
            let windSource = null;
            let rainSource = null;
            let windGain = null;
            let rainGain = null;
            let masterGain = null;

            function resizeStorm() {
                stormCanvas.width = Math.floor(window.innerWidth * window.devicePixelRatio);
                stormCanvas.height = Math.floor(window.innerHeight * window.devicePixelRatio);
                stormCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
                if (!rainDrops.length) {
                    for (let i = 0; i < rainCount; i++) {
                        rainDrops.push({});
                    }
                }
                rainDrops.forEach((drop) => resetDrop(drop));
            }

            function resetDrop(drop) {
                drop.x = Math.random() * window.innerWidth;
                drop.y = Math.random() * window.innerHeight;
                drop.vy = 520 + Math.random() * 720;
                drop.len = 12 + Math.random() * 22;
                drop.wind = -260 + Math.random() * 160;
                drop.alpha = 0.15 + Math.random() * 0.25;
            }

            function drawRain(dt) {
                stormCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                stormCtx.strokeStyle = 'rgba(200, 220, 255, 0.35)';
                stormCtx.lineWidth = 1.4;
                for (let i = 0; i < rainDrops.length; i++) {
                    const drop = rainDrops[i];
                    const x2 = drop.x + drop.wind * dt * 0.9;
                    const y2 = drop.y + drop.len;
                    stormCtx.globalAlpha = drop.alpha;
                    stormCtx.beginPath();
                    stormCtx.moveTo(drop.x, drop.y);
                    stormCtx.lineTo(x2, y2);
                    stormCtx.stroke();
                    drop.x = x2;
                    drop.y += drop.vy * dt;
                    if (drop.y > window.innerHeight + 40 || drop.x < -60 || drop.x > window.innerWidth + 60) {
                        resetDrop(drop);
                        drop.y = -40;
                    }
                }
                stormCtx.globalAlpha = 1;
                drawBolts();
            }

            function spawnBolt2d() {
                if (boltSprite) {
                    boltSprite.life = 0;
                    boltSprite.ttl = 0.4 + Math.random() * 0.25;
                    return;
                }
                const distanceScale = 0.55;
                const horizonY = window.innerHeight * 0.12;
                const segments = 8 + Math.floor(Math.random() * 6);
                const points = [];
                let x = Math.random() * window.innerWidth;
                let y = horizonY + Math.random() * window.innerHeight * 0.08;
                points.push([x, y]);
                for (let i = 0; i < segments; i++) {
                    x += (Math.random() - 0.5) * 90 * distanceScale;
                    y += (30 + Math.random() * 45) * distanceScale;
                    points.push([x, y]);
                }
                boltSprite = { points, life: 0, ttl: 0.4 + Math.random() * 0.25 };
                lightningBolts.push(boltSprite);
            }

            function updateBolts(dt) {
                for (let i = lightningBolts.length - 1; i >= 0; i--) {
                    const bolt = lightningBolts[i];
                    bolt.life += dt;
                    if (bolt.life >= bolt.ttl) {
                        lightningBolts.splice(i, 1);
                        if (bolt === boltSprite) {
                            boltSprite = null;
                        }
                    }
                }
            }

            function drawBolts() {
                if (!lightningBolts.length) return;
                stormCtx.lineWidth = 2.8;
                stormCtx.lineCap = 'round';
                stormCtx.shadowColor = 'rgba(210, 235, 255, 0.9)';
                stormCtx.shadowBlur = 10;
                stormCtx.strokeStyle = 'rgba(230, 240, 255, 0.95)';
                for (let i = 0; i < lightningBolts.length; i++) {
                    const bolt = lightningBolts[i];
                    const fade = Math.max(0, 1 - bolt.life / bolt.ttl);
                    stormCtx.globalAlpha = 0.9 * fade;
                    stormCtx.beginPath();
                    const [startX, startY] = bolt.points[0];
                    stormCtx.moveTo(startX, startY);
                    for (let p = 1; p < bolt.points.length; p++) {
                        const [px, py] = bolt.points[p];
                        stormCtx.lineTo(px, py);
                    }
                    stormCtx.stroke();
                }
                stormCtx.shadowBlur = 0;
                stormCtx.globalAlpha = 1;
            }

            function spawnBolt3d() {
                const segments = 8 + Math.floor(Math.random() * 6);
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                const origin = cameraRig.position.clone();
                const distance = 60 + Math.random() * 80;
                const start = origin.add(forward.multiplyScalar(distance));
                let x = start.x + (Math.random() - 0.5) * 80;
                let y = 40 + Math.random() * 40;
                let z = start.z + (Math.random() - 0.5) * 80;
                const points = [new THREE.Vector3(x, y, z)];
                for (let i = 0; i < segments; i++) {
                    x += (Math.random() - 0.5) * 8;
                    y -= 6 + Math.random() * 10;
                    z += (Math.random() - 0.5) * 8;
                    points.push(new THREE.Vector3(x, y, z));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = lightningMaterial.clone();
                const line = new THREE.Line(geometry, material);
                line.frustumCulled = false;
                lightningGroup.add(line);
                lightningBolts3d.push({ line, life: 0, ttl: 0.45 + Math.random() * 0.25 });
            }

            function updateBolts3d(dt) {
                for (let i = lightningBolts3d.length - 1; i >= 0; i--) {
                    const bolt = lightningBolts3d[i];
                    bolt.life += dt;
                    const fade = Math.max(0, 1 - bolt.life / bolt.ttl);
                    bolt.line.material.opacity = 0.9 * fade;
                    if (bolt.life >= bolt.ttl) {
                        lightningGroup.remove(bolt.line);
                        bolt.line.geometry.dispose();
                        bolt.line.material.dispose();
                        lightningBolts3d.splice(i, 1);
                    }
                }
            }

            function clearBolts3d() {
                for (let i = lightningBolts3d.length - 1; i >= 0; i--) {
                    const bolt = lightningBolts3d[i];
                    lightningGroup.remove(bolt.line);
                    bolt.line.geometry.dispose();
                    bolt.line.material.dispose();
                }
                lightningBolts3d.length = 0;
            }

            function createNoiseBuffer(ctx, seconds) {
                const buffer = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.6;
                }
                return buffer;
            }

            function startAudio() {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(audioCtx.destination);

                windGain = audioCtx.createGain();
                windGain.gain.value = 0.18;
                rainGain = audioCtx.createGain();
                rainGain.gain.value = 0.12;

                const windFilter = audioCtx.createBiquadFilter();
                windFilter.type = 'bandpass';
                windFilter.frequency.value = 1400;
                windFilter.Q.value = 0.7;

                const rainFilter = audioCtx.createBiquadFilter();
                rainFilter.type = 'highpass';
                rainFilter.frequency.value = 1400;

                windSource = audioCtx.createBufferSource();
                windSource.buffer = createNoiseBuffer(audioCtx, 2.4);
                windSource.loop = true;
                windSource.connect(windFilter);
                windFilter.connect(windGain);
                windGain.connect(masterGain);

                rainSource = audioCtx.createBufferSource();
                rainSource.buffer = createNoiseBuffer(audioCtx, 1.6);
                rainSource.loop = true;
                rainSource.connect(rainFilter);
                rainFilter.connect(rainGain);
                rainGain.connect(masterGain);

                windSource.start();
                rainSource.start();
            }

            function stopAudio() {
                if (windSource) windSource.stop();
                if (rainSource) rainSource.stop();
                windSource = null;
                rainSource = null;
                if (audioCtx) {
                    audioCtx.close();
                }
                audioCtx = null;
            }

            function playThunder(hasBolt) {
                if (!audioCtx) return;
                const source = audioCtx.createBufferSource();
                source.buffer = createNoiseBuffer(audioCtx, 2.6);
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 220;
                const gain = audioCtx.createGain();
                gain.gain.value = 0.0;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                if (hasBolt) {
                    const delay = audioCtx.createDelay(1.0);
                    delay.delayTime.value = 0.28;
                    const feedback = audioCtx.createGain();
                    feedback.gain.value = 0.35;
                    const echoGain = audioCtx.createGain();
                    echoGain.gain.value = 0.55;
                    gain.connect(delay);
                    delay.connect(echoGain);
                    echoGain.connect(masterGain);
                    delay.connect(feedback);
                    feedback.connect(delay);
                }
                const now = audioCtx.currentTime;
                const peak = hasBolt ? 1.6 : 0.7;
                gain.gain.linearRampToValueAtTime(peak, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.05, now + 1.8);
                source.start();
                source.stop(now + 2.2);
            }

            soundToggle.addEventListener('click', async () => {
                if (!audioCtx) {
                    startAudio();
                    await audioCtx.resume();
                    soundToggle.classList.add('is-on');
                    soundToggle.textContent = 'Disable Storm Sound';
                } else {
                    stopAudio();
                    soundToggle.classList.remove('is-on');
                    soundToggle.textContent = 'Enable Storm Sound';
                }
            });

            function updateTile(geometry, time, zOffset, updateNormals) {
                const pos = geometry.attributes.position;
                const colors = geometry.attributes.color;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i) + zOffset;
                    const height = heightAt(x, z, time);
                    pos.setY(i, height);
                    if (colors) {
                        const cap = Math.min(1, Math.max(0, (height - 6.2) / 4.0));
                        const foam = Math.pow(cap, 1.6);
                        const baseR = 0.04;
                        const baseG = 0.07;
                        const baseB = 0.12;
                        colors.setXYZ(i,
                            baseR + foam * 0.9,
                            baseG + foam * 0.9,
                            baseB + foam * 0.9
                        );
                    }
                }
                pos.needsUpdate = true;
                if (colors) {
                    colors.needsUpdate = true;
                }
                if (updateNormals) {
                    geometry.computeVertexNormals();
                }
            }

            function animate() {
                const dt = clock.getDelta();
                offset = (offset + dt * speed) % travelLength;
                const time = clock.elapsedTime;

                const updateNormals = normalFrame++ % 2 === 0;
                tiles.forEach((tile, idx) => {
                    let zPos = -idx * tileLength + offset;
                    if (zPos > tileLength) zPos -= travelLength;
                    tile.mesh.position.z = zPos;
                    tile.wire.position.z = zPos;
                    updateTile(tile.mesh.geometry, time, zPos, updateNormals);
                    updateTile(tile.wire.geometry, time, zPos, false);
                });

                const sway = Math.sin(time * 0.4) * 6;
                const bob = Math.sin(time * 1.2) * 1.2;
                const camZ = 18;
                const buffer = 12.5;
                prevCamX = camX;
                prevCamY = camY;
                camX += (sway - camX) * 0.08;
                const terrainHeight = heightAt(camX, camZ, time);
                const desiredY = 16 + bob;
                const targetY = Math.max(desiredY, terrainHeight + buffer);
                camY += (targetY - camY) * 0.08;
                cameraRig.position.set(camX, camY, camZ);
                const dx = camX - prevCamX;
                const targetRoll = THREE.MathUtils.clamp(dx * -0.1, -0.28, 0.28);
                rollSmooth += (targetRoll - rollSmooth) * 0.08;
                if (!renderer.xr.isPresenting) {
                    camera.lookAt(0, 6 + bob * 0.3, -30);
                    camera.rotation.z = rollSmooth;
                }

                scene.rotation.z = Math.sin(time * 0.35) * 0.035;
                lightningNext -= dt;
                if (lightningNext <= 0) {
                    if (lightningBurst <= 0) {
                        lightningBurst = 2 + Math.floor(Math.random() * 3);
                        lightningBurstGap = 0.12 + Math.random() * 0.12;
                        lightningNext = 0;
                    }
                }

                if (lightningBurst > 0) {
                    lightningBurstGap -= dt;
                    if (lightningBurstGap <= 0) {
                        lightningFlash = Math.min(1, lightningFlash + 0.55 + Math.random() * 0.25);
                        lightningBurst -= 1;
                        lightningBurstGap = 0.1 + Math.random() * 0.12;
                        const hasBolt = Math.random() < 0.85;
                        if (hasBolt) {
                            if (renderer.xr.isPresenting) {
                                spawnBolt3d();
                            } else {
                                spawnBolt2d();
                            }
                        }
                        if (Math.random() < 0.6) {
                            playThunder(hasBolt);
                        }
                        if (lightningBurst <= 0) {
                            lightningNext = 2.5 + Math.random() * 5;
                        }
                    }
                }

                if (lightningFlash > 0) {
                    lightningFlash = Math.max(0, lightningFlash - dt * 3.2);
                    const flash = lightningFlash;
                    ambient.intensity = baseAmbient + flash * 0.8;
                    keyLight.intensity = baseKey + flash * 2.2;
                    if (!renderer.xr.isPresenting) {
                        stormCtx.fillStyle = `rgba(255,255,255,${0.15 * flash})`;
                        stormCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                    }
                } else {
                    ambient.intensity = baseAmbient;
                    keyLight.intensity = baseKey;
                }

                renderer.render(scene, camera);
                if (renderer.xr.isPresenting) {
                    updateBolts3d(dt);
                } else {
                    drawRain(dt);
                    updateBolts(dt);
                }
            }
            renderer.setAnimationLoop(animate);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                resizeStorm();
            });

            resizeStorm();

            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }

            function createVRButton(rendererInstance) {
                const button = document.createElement("button");
                button.style.position = "fixed";
                button.style.right = "20px";
                button.style.bottom = "20px";
                button.style.padding = "0.8rem 1.2rem";
                button.style.border = "1px solid rgba(255, 255, 255, 0.4)";
                button.style.borderRadius = "4px";
                button.style.background = "rgba(0, 0, 0, 0.6)";
                button.style.color = "#e9f7ff";
                button.style.font = "600 0.9rem var(--font-primary)";
                button.style.letterSpacing = "0.08em";
                button.style.textTransform = "uppercase";
                button.style.cursor = "pointer";
                button.style.zIndex = "999";
                button.textContent = "Enter VR";

                if (!("xr" in navigator)) {
                    button.textContent = "VR Not Supported";
                    button.style.cursor = "default";
                    button.disabled = true;
                    return button;
                }

                let currentSession = null;

                function onSessionEnded() {
                    currentSession = null;
                    button.textContent = "Enter VR";
                    if (audioCtx) {
                        stopAudio();
                        soundToggle.classList.remove('is-on');
                        soundToggle.textContent = 'Enable Storm Sound';
                    }
                }

                async function onSessionStarted(session) {
                    currentSession = session;
                    session.addEventListener("end", onSessionEnded);
                    await rendererInstance.xr.setSession(session);
                    button.textContent = "Exit VR";
                    if (!audioCtx) {
                        startAudio();
                        await audioCtx.resume();
                        soundToggle.classList.add('is-on');
                        soundToggle.textContent = 'Disable Storm Sound';
                    }
                }

                navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
                    if (!supported) {
                        button.textContent = "VR Not Supported";
                        button.style.cursor = "default";
                        button.disabled = true;
                        return;
                    }

                    button.addEventListener("click", () => {
                        if (currentSession === null) {
                            navigator.xr.requestSession("immersive-vr", {
                                optionalFeatures: ["local-floor", "bounded-floor"]
                            }).then(onSessionStarted);
                        } else {
                            currentSession.end();
                        }
                    });
                });

                return button;
            }

            document.body.appendChild(createVRButton(renderer));
        })();
    </script>
</body>
</html>
