<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain Shader | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Rain Shader</p>
        <p class="subtitle">Layered rain shader with splashes, wind shear, streaked camera motion, and reflective ground ripples.</p>
    </div>

    <canvas id="particles"></canvas>
    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
          const canvas = document.getElementById("particles");
          const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.setSize(window.innerWidth, window.innerHeight);

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0x0b0d11);

          const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
          camera.position.set(0, 2, 6);

          const ambient = new THREE.AmbientLight(0xffffff, 0.7);
          scene.add(ambient);

          const COUNT = 900;
          const SPAWN_HEIGHT = 8;
          const DESPAWN_Y = -6;
          const AREA_XZ = 10;
          const GRAVITY = 4.5;
          const RAMP_DURATION = 15; // seconds to reach full rain rate
          const positions = new Float32Array(COUNT * 3);
          const velX = new Float32Array(COUNT);
          const velY = new Float32Array(COUNT);
          const velZ = new Float32Array(COUNT);
          const respawnTimers = new Float32Array(COUNT);
          let activation = 0;
          let activeCount = 0;
          let mode = "rain";

          function respawnRain(i) {
            const idx = i * 3;
            positions[idx + 0] = (Math.random() - 0.5) * AREA_XZ;
            positions[idx + 1] = SPAWN_HEIGHT + Math.random() * 6;
            positions[idx + 2] = (Math.random() - 0.5) * AREA_XZ;
            velX[i] = 0;
            velY[i] = 0.6 + Math.random() * 0.9;
            velZ[i] = 0;
            respawnTimers[i] = 0;
          }

          function initRain() {
            activation = 0;
            activeCount = 0;
            for (let i = 0; i < COUNT; i++) {
              respawnRain(i);
              respawnTimers[i] = Math.random() * 1.5;
            }
          }

          initRain();

          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

          const material = new THREE.PointsMaterial({
            color: 0x66ccff,
            size: 0.05,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.9
          });

          const points = new THREE.Points(geometry, material);
          scene.add(points);

          const clock = new THREE.Clock();

          function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);

            activation = Math.min(1, activation + delta / RAMP_DURATION);
            const targetActive = Math.max(1, Math.floor(COUNT * activation));
            if (targetActive > activeCount) {
              for (let i = activeCount; i < targetActive; i++) {
                respawnRain(i);
                respawnTimers[i] = Math.random() * 1.5;
              }
              activeCount = targetActive;
            }

            for (let i = 0; i < activeCount; i++) {
              if (respawnTimers[i] > 0) {
                respawnTimers[i] -= delta;
                continue;
              }
              const idx = i * 3;
              velY[i] += GRAVITY * delta;
              positions[idx + 1] -= velY[i] * delta;
              positions[idx + 0] += (Math.random() - 0.5) * 0.01;
              positions[idx + 2] += (Math.random() - 0.5) * 0.01;
              if (positions[idx + 1] < DESPAWN_Y) {
                positions[idx + 1] = DESPAWN_Y;
                respawnTimers[i] = Math.random() * 0.6;
                continue;
              }
            }
            for (let i = 0; i < activeCount; i++) {
              if (respawnTimers[i] <= 0 && positions[i * 3 + 1] <= DESPAWN_Y) {
                respawnRain(i);
              }
            }

            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
          }

          animate();

          window.addEventListener("resize", () => {
            const { innerWidth, innerHeight } = window;
            renderer.setSize(innerWidth, innerHeight);
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
          });
        })();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
