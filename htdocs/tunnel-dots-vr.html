<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curved Dotted Tunnel VR | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Curved Dotted Tunnel VR</p>
        <p class="subtitle">Immersive neon dots that flow, wobble, and twist toward you.</p>
    </div>

    <canvas id="tunnel-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById('tunnel-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            const defaultPixelRatio = Math.min(1.25, window.devicePixelRatio);
            renderer.setPixelRatio(defaultPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType("local-floor");
            renderer.xr.addEventListener("sessionstart", () => {
                renderer.setPixelRatio(1);
            });
            renderer.xr.addEventListener("sessionend", () => {
                renderer.setPixelRatio(defaultPixelRatio);
            });

            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x05070d, 20, 140);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
            const cameraRig = new THREE.Group();
            cameraRig.add(camera);
            scene.add(cameraRig);

            const pointMat = new THREE.PointsMaterial({ color: 0x3aa7d6, size: 0.35, transparent: false, opacity: 0.8, sizeAttenuation: true });
            const tunnel = new THREE.Group();
            scene.add(tunnel);

            const ringCount = 72;
            const segments = 48;
            const radius = 12;
            const spacing = 3.2;
            const noiseAmp = 1.8;

            const rings = [];
            for (let i = 0; i < ringCount; i++) {
                const geom = new THREE.BufferGeometry();
                const verts = [];
                for (let s = 0; s <= segments; s++) {
                    const angle = (s / segments) * Math.PI * 2;
                    verts.push(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
                }
                geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
                const ring = new THREE.Points(geom, pointMat.clone());
                ring.position.z = -i * spacing;
                ring.material.size = 0.32 + (i / ringCount) * 0.22;
                tunnel.add(ring);
                rings.push(ring);
            }

            const clock = new THREE.Clock();
            let offset = 0;
            const travelLength = ringCount * spacing;
            const speed = 15;
            const pathFreq = 0.1;
            const pathAmpX = 7;
            const pathAmpY = 5.2;
            let deformFrame = 0;

            function pathOffset(z, t) {
                const phase = (z + t * speed) * pathFreq;
                const noisePhase = z * 0.2 + t * 0.8;
                const noiseX = Math.sin(noisePhase + 1.3) + Math.sin(noisePhase * 0.55 + 2.1);
                const noiseY = Math.cos(noisePhase * 0.95 + 0.6) + Math.sin(noisePhase * 0.42 + 0.9);
                return {
                    x: Math.sin(phase) * pathAmpX + noiseX * 1.4,
                    y: Math.cos(phase * 0.85) * pathAmpY + noiseY * 1.1
                };
            }

            function animate() {
                const dt = clock.getDelta();
                offset = (offset + dt * speed) % travelLength;
                const time = clock.elapsedTime;

                rings.forEach((ring, idx) => {
                    let zPos = -idx * spacing + offset;
                    if (zPos > spacing) zPos -= travelLength;
                    const { x, y } = pathOffset(zPos, time);
                    ring.position.set(x, y, zPos);
                    ring.rotation.z = 0;

                    if (deformFrame++ % 2 === 0) {
                        const pos = ring.geometry.attributes.position;
                        for (let i = 0; i < pos.count; i++) {
                            const vx = pos.getX(i);
                            const vy = pos.getY(i);
                            const noise = Math.sin((vx + time * 6) * 0.12) * Math.cos((vy - time * 5) * 0.12) * noiseAmp;
                            pos.setZ(i, noise);
                        }
                        pos.needsUpdate = true;
                    }
                });

                const camCenter = pathOffset(0, time);
                const lookAhead = pathOffset(-spacing * 8, time);
                cameraRig.position.set(camCenter.x, camCenter.y, 10);
                if (!renderer.xr.isPresenting) {
                    camera.lookAt(lookAhead.x, lookAhead.y, -spacing * 8);
                }

                scene.rotation.z = Math.sin(time * 0.2) * 0.05;
                renderer.render(scene, camera);
            }
            renderer.setAnimationLoop(animate);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }

            function createVRButton(rendererInstance) {
                const button = document.createElement("button");
                button.style.position = "fixed";
                button.style.right = "20px";
                button.style.bottom = "20px";
                button.style.padding = "0.8rem 1.2rem";
                button.style.border = "1px solid rgba(255, 255, 255, 0.4)";
                button.style.borderRadius = "4px";
                button.style.background = "rgba(0, 0, 0, 0.6)";
                button.style.color = "#e9f7ff";
                button.style.font = "600 0.9rem var(--font-primary)";
                button.style.letterSpacing = "0.08em";
                button.style.textTransform = "uppercase";
                button.style.cursor = "pointer";
                button.style.zIndex = "999";
                button.textContent = "Enter VR";

                if (!("xr" in navigator)) {
                    button.textContent = "VR Not Supported";
                    button.style.cursor = "default";
                    button.disabled = true;
                    return button;
                }

                let currentSession = null;

                function onSessionEnded() {
                    currentSession = null;
                    button.textContent = "Enter VR";
                }

                async function onSessionStarted(session) {
                    currentSession = session;
                    session.addEventListener("end", onSessionEnded);
                    await rendererInstance.xr.setSession(session);
                    button.textContent = "Exit VR";
                }

                navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
                    if (!supported) {
                        button.textContent = "VR Not Supported";
                        button.style.cursor = "default";
                        button.disabled = true;
                        return;
                    }

                    button.addEventListener("click", () => {
                        if (currentSession === null) {
                            navigator.xr.requestSession("immersive-vr", {
                                optionalFeatures: ["local-floor", "bounded-floor"]
                            }).then(onSessionStarted);
                        } else {
                            currentSession.end();
                        }
                    });
                });

                return button;
            }

            document.body.appendChild(createVRButton(renderer));
        })();
    </script>
</body>
</html>
