<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canyon Flight VR | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Canyon Flight VR</p>
        <p class="subtitle">An immersive VR flight through a canyon corridor with towering walls.</p>
    </div>

    <canvas id="canyon-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById('canyon-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            const defaultPixelRatio = Math.min(1.25, window.devicePixelRatio);
            renderer.setPixelRatio(defaultPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x8fc9ff, 1);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType("local-floor");
            renderer.xr.addEventListener("sessionstart", () => {
                renderer.setPixelRatio(1);
            });
            renderer.xr.addEventListener("sessionend", () => {
                renderer.setPixelRatio(defaultPixelRatio);
            });

            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x8fc9ff, 30, 180);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
            const cameraRig = new THREE.Group();
            cameraRig.add(camera);
            scene.add(cameraRig);

            const ambient = new THREE.AmbientLight(0xb6dbff, 0.55);
            scene.add(ambient);

            const keyLight = new THREE.DirectionalLight(0xfff3e6, 0.85);
            keyLight.position.set(30, 60, 20);
            scene.add(keyLight);

            const rimLight = new THREE.DirectionalLight(0x7fb6ff, 0.45);
            rimLight.position.set(-20, 40, -40);
            scene.add(rimLight);

            const terrainGroup = new THREE.Group();
            scene.add(terrainGroup);
            
            const treeGroup = new THREE.Group();
            scene.add(treeGroup);

            const tileCount = 3;
            const tileLength = 120;
            const width = 120;
            const depth = 120;
            const segmentsX = 80;
            const segmentsZ = 56;

            const baseGeometry = new THREE.PlaneGeometry(width, depth, segmentsX, segmentsZ);
            baseGeometry.rotateX(-Math.PI / 2);

            const terrainMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.98,
                metalness: 0.02,
                flatShading: true,
                vertexColors: true
            });
            const wireMaterial = new THREE.LineBasicMaterial({
                color: 0x4fd6ff,
                transparent: true,
                opacity: 0.6
            });

            const tiles = [];
            for (let i = 0; i < tileCount; i++) {
                const meshGeom = baseGeometry.clone();
                const wireGeom = baseGeometry.clone();
                const gridIndex = [];
                const vertsX = segmentsX + 1;
                const vertsZ = segmentsZ + 1;
                for (let z = 0; z < vertsZ; z++) {
                    for (let x = 0; x < segmentsX; x++) {
                        const a = z * vertsX + x;
                        gridIndex.push(a, a + 1);
                    }
                }
                for (let z = 0; z < segmentsZ; z++) {
                    for (let x = 0; x < vertsX; x++) {
                        const a = z * vertsX + x;
                        gridIndex.push(a, a + vertsX);
                    }
                }
                wireGeom.setIndex(gridIndex);
                meshGeom.setAttribute(
                    'color',
                    new THREE.Float32BufferAttribute(
                        new Float32Array(meshGeom.attributes.position.count * 3),
                        3
                    )
                );
                const mesh = new THREE.Mesh(meshGeom, terrainMaterial.clone());
                const wire = new THREE.LineSegments(wireGeom, wireMaterial.clone());
                mesh.position.z = -i * tileLength;
                wire.position.z = -i * tileLength;
                terrainGroup.add(mesh);
                terrainGroup.add(wire);
                tiles.push({ mesh, wire });
            }

            function createRadialTexture(size, stops) {
                const canvasTex = document.createElement('canvas');
                canvasTex.width = size;
                canvasTex.height = size;
                const ctx = canvasTex.getContext('2d');
                const gradient = ctx.createRadialGradient(
                    size * 0.5,
                    size * 0.5,
                    0,
                    size * 0.5,
                    size * 0.5,
                    size * 0.5
                );
                stops.forEach((stop) => {
                    gradient.addColorStop(stop[0], stop[1]);
                });
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);
                const texture = new THREE.CanvasTexture(canvasTex);
                texture.needsUpdate = true;
                return texture;
            }


            const sunTexture = createRadialTexture(256, [
                [0, 'rgba(255, 248, 220, 1)'],
                [0.5, 'rgba(255, 236, 180, 0.7)'],
                [1, 'rgba(255, 236, 180, 0)']
            ]);
            const sunMaterial = new THREE.SpriteMaterial({
                map: sunTexture,
                color: 0xffffff,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthTest: true
            });
            const sunSprite = new THREE.Sprite(sunMaterial);
            sunSprite.scale.set(34, 34, 1);
            const sunPosition = new THREE.Vector3(140, 46, -165);
            sunSprite.position.copy(sunPosition);
            scene.add(sunSprite);

            function triWave(value) {
                return (2 / Math.PI) * Math.asin(Math.sin(value));
            }

            function smoothstep(t) {
                return t * t * (3 - 2 * t);
            }

            function smoothstepRange(edge0, edge1, x) {
                const t = THREE.MathUtils.clamp((x - edge0) / (edge1 - edge0), 0, 1);
                return smoothstep(t);
            }

            function hash2(x, z) {
                const s = Math.sin(x * 127.1 + z * 311.7 + noiseSeed) * 43758.5453;
                return s - Math.floor(s);
            }

            function valueNoise(x, z) {
                const xi = Math.floor(x);
                const zi = Math.floor(z);
                const xf = x - xi;
                const zf = z - zi;
                const u = smoothstep(xf);
                const v = smoothstep(zf);

                const n00 = hash2(xi, zi);
                const n10 = hash2(xi + 1, zi);
                const n01 = hash2(xi, zi + 1);
                const n11 = hash2(xi + 1, zi + 1);
                const nx0 = n00 + (n10 - n00) * u;
                const nx1 = n01 + (n11 - n01) * u;
                return nx0 + (nx1 - nx0) * v;
            }

            function heightAt(x, z, travel) {
                const zTravel = z - travel;
                const halfWidth = width * 0.5;
                const side = Math.min(1, Math.abs(x) / (halfWidth * 0.95));
                const wallRise = Math.pow(side, 2.35) * 34;
                const strata = triWave(zTravel * 0.05 + x * 0.03) * (4 + side * 7);
                const rough = (valueNoise(x * noiseScale, zTravel * noiseScale) - 0.5) * noiseAmp * (0.5 + side * 1.6);
                const floor = (valueNoise(x * 0.12, zTravel * 0.12) - 0.5) * 1.4;
                return wallRise + strata + rough + floor - 2;
            }

            const clock = new THREE.Clock();
            let offset = 0;
            let travel = 0;
            const speed = 44;
            const travelLength = tileCount * tileLength;
            let camX = 0;
            let camY = 16;
            let prevCamX = 0;
            let prevCamY = 16;
            let rollSmooth = 0;
            const noiseSeed = Math.random() * 1000;
            const noiseScale = 0.08;
            const noiseAmp = 8.4;
            let normalFrame = 0;

            const treeCount = 260;
            const treeGeometry = new THREE.ConeGeometry(0.7, 4.2, 5);
            const treeMaterial = new THREE.MeshStandardMaterial({
                color: 0x1c2f1a,
                roughness: 0.95,
                metalness: 0.0
            });
            const trees = new THREE.InstancedMesh(treeGeometry, treeMaterial, treeCount);
            const treeData = [];
            const tempMatrix = new THREE.Matrix4();
            const tempPosition = new THREE.Vector3();
            const tempScale = new THREE.Vector3();
            const tempQuat = new THREE.Quaternion();
            trees.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            treeGroup.add(trees);

            for (let i = 0; i < treeCount; i++) {
                const baseX = (Math.random() - 0.5) * width * 0.45;
                const baseZ = -Math.random() * travelLength;
                const scale = 0.6 + Math.random() * 0.9;
                treeData.push({ baseX, baseZ, scale });
            }

            function updateTile(geometry, travel, zOffset, updateNormals) {
                const pos = geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i) + zOffset;
                    const height = heightAt(x, z, travel);
                    pos.setY(i, height);
                }
                pos.needsUpdate = true;
                if (updateNormals) {
                    geometry.computeVertexNormals();
                }
                const colors = geometry.attributes.color;
                if (colors && geometry.attributes.normal && updateNormals) {
                    const normal = geometry.attributes.normal;
                    for (let i = 0; i < pos.count; i++) {
                        const y = pos.getY(i);
                        const ny = normal.getY(i);
                        const valley = 1 - smoothstepRange(5, 11, y);
                        const snowBase = smoothstepRange(16, 26, y);
                        const snow = snowBase * smoothstepRange(0.55, 0.92, ny);
                        const steep = smoothstepRange(0.25, 0.65, 1 - ny);
                        const rock = Math.max(0, 1 - valley - snow);
                        const green = valley * (1 - steep * 0.6);

                        const rockTint = { r: 0.48, g: 0.49, b: 0.52 };
                        const steepRock = { r: 0.32, g: 0.33, b: 0.36 };
                        const snowTint = { r: 0.92, g: 0.94, b: 0.97 };
                        const greenTint = { r: 0.18, g: 0.34, b: 0.18 };

                        let r = rockTint.r * rock + greenTint.r * green + snowTint.r * snow;
                        let g = rockTint.g * rock + greenTint.g * green + snowTint.g * snow;
                        let b = rockTint.b * rock + greenTint.b * green + snowTint.b * snow;
                        r = r * (1 - steep) + steepRock.r * steep;
                        g = g * (1 - steep) + steepRock.g * steep;
                        b = b * (1 - steep) + steepRock.b * steep;

                        colors.setXYZ(i, r, g, b);
                    }
                    colors.needsUpdate = true;
                }
            }


            function animate() {
                const dt = clock.getDelta();
                travel += dt * speed;
                offset = (offset + dt * speed) % travelLength;
                const time = clock.elapsedTime;

                const updateNormals = normalFrame++ % 2 === 0;
                tiles.forEach((tile, idx) => {
                    let zPos = -idx * tileLength + offset;
                    if (zPos > tileLength) zPos -= travelLength;
                    tile.mesh.position.z = zPos;
                    tile.wire.position.z = zPos;
                    updateTile(tile.mesh.geometry, travel, zPos, updateNormals);
                    updateTile(tile.wire.geometry, travel, zPos, false);
                });
                const treeTravel = travel % travelLength;
                for (let i = 0; i < treeData.length; i++) {
                    const tree = treeData[i];
                    let zPos = tree.baseZ + treeTravel;
                    if (zPos > tileLength) zPos -= travelLength;
                    const ground = heightAt(tree.baseX, zPos, travel);
                    tempPosition.set(tree.baseX, ground + 2.2 * tree.scale, zPos);
                    tempScale.set(tree.scale, tree.scale, tree.scale);
                    tempQuat.set(0, 0, 0, 1);
                    tempMatrix.compose(tempPosition, tempQuat, tempScale);
                    trees.setMatrixAt(i, tempMatrix);
                }
                trees.instanceMatrix.needsUpdate = true;

                const sway = 0;
                const bob = 0;
                const camZ = 18;
                const buffer = 18;
                const lookAhead = 26;
                prevCamX = camX;
                prevCamY = camY;
                camX += (sway - camX) * 0.08;
                camY = 16 + bob;
                cameraRig.position.set(camX, camY, camZ);
                if (!renderer.xr.isPresenting) {
                    camera.lookAt(0, camY - 10, -30);
                    camera.rotation.z = 0;
                }

                sunSprite.material.opacity = 0.9;

                scene.rotation.z = Math.sin(time * 0.35) * 0.035;
                renderer.render(scene, camera);
            }
            renderer.setAnimationLoop(animate);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }

            function createVRButton(rendererInstance) {
                const button = document.createElement("button");
                button.style.position = "fixed";
                button.style.right = "20px";
                button.style.bottom = "20px";
                button.style.padding = "0.8rem 1.2rem";
                button.style.border = "1px solid rgba(255, 255, 255, 0.4)";
                button.style.borderRadius = "4px";
                button.style.background = "rgba(0, 0, 0, 0.6)";
                button.style.color = "#e9f7ff";
                button.style.font = "600 0.9rem var(--font-primary)";
                button.style.letterSpacing = "0.08em";
                button.style.textTransform = "uppercase";
                button.style.cursor = "pointer";
                button.style.zIndex = "999";
                button.textContent = "Enter VR";

                if (!("xr" in navigator)) {
                    button.textContent = "VR Not Supported";
                    button.style.cursor = "default";
                    button.disabled = true;
                    return button;
                }

                let currentSession = null;

                function onSessionEnded() {
                    currentSession = null;
                    button.textContent = "Enter VR";
                }

                async function onSessionStarted(session) {
                    currentSession = session;
                    session.addEventListener("end", onSessionEnded);
                    await rendererInstance.xr.setSession(session);
                    button.textContent = "Exit VR";
                }

                navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
                    if (!supported) {
                        button.textContent = "VR Not Supported";
                        button.style.cursor = "default";
                        button.disabled = true;
                        return;
                    }

                    button.addEventListener("click", () => {
                        if (currentSession === null) {
                            navigator.xr.requestSession("immersive-vr", {
                                optionalFeatures: ["local-floor", "bounded-floor"]
                            }).then(onSessionStarted);
                        } else {
                            currentSession.end();
                        }
                    });
                });

                return button;
            }

            document.body.appendChild(createVRButton(renderer));
        })();
    </script>
</body>
</html>
