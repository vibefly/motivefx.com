<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tunnel | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #78d5ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #b8e7ff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Portal Tunnel</p>
        <p class="subtitle">Light trails emerging from the core, swimming outward into the dark.</p>
    </div>

    <script src="js/three.min.r134.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.045);

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 120);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x224455, 0.6);
        scene.add(ambient);

        const core = new THREE.PointLight(0x88ccff, 2.5, 40, 2);
        core.position.set(0, 0, 0);
        scene.add(core);

        // Starfield to frame the tunnel
        const starCount = 900;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const i3 = i * 3;
            starPositions[i3] = (Math.random() - 0.5) * 80;
            starPositions[i3 + 1] = (Math.random() - 0.5) * 80;
            starPositions[i3 + 2] = (Math.random() - 0.5) * 80;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(
            starGeo,
            new THREE.PointsMaterial({ color: 0x5fb4ff, size: 0.04, transparent: true, opacity: 0.7, depthWrite: false })
        );
        scene.add(stars);

        const tunnelLines = [];
        const segments = 100;
        const temp = new THREE.Vector3();

        function randomUnitVector() {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            temp.set(
                Math.sin(phi) * Math.cos(theta),
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi)
            );
            return temp.clone().normalize();
        }

        function createTunnelLine(idx) {
            const dir = randomUnitVector().normalize();
            const ortho1 = randomUnitVector().cross(dir).normalize();
            const ortho2 = dir.clone().cross(ortho1).normalize();

            const positions = new Float32Array((segments + 1) * 3);
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

            const hue = idx / 140;
            const material = new THREE.LineBasicMaterial({
                color: new THREE.Color().setHSL(hue, 0.7, 0.55),
                transparent: true,
                opacity: 0.8
            });

            const line = new THREE.Line(geometry, material);
            scene.add(line);

            return {
                line,
                dir,
                ortho1,
                ortho2,
                positions,
                length: 35 + Math.random() * 25,
                phase: Math.random() * Math.PI * 2,
                speed: 0.6 + Math.random() * 0.7,
                hueOffset: Math.random()
            };
        }

        const lineCount = 140;
        for (let i = 0; i < lineCount; i++) {
            tunnelLines.push(createTunnelLine(i));
        }

        const clock = new THREE.Clock();

        function updateLine(line, time) {
            const { dir, ortho1, ortho2, positions, line: mesh, length, phase, speed, hueOffset } = line;
            const posAttr = mesh.geometry.attributes.position;

            for (let s = 0; s <= segments; s++) {
                const t = s / segments;
                const radial = t * length + Math.sin(time * 0.6 + t * 8 + phase) * 0.9;
                const swirl = Math.sin(time * 1.1 + t * 11 + phase) * 0.7;

                temp.copy(dir).multiplyScalar(radial);
                temp.addScaledVector(ortho1, Math.sin(t * 9 + time * 1.5 + phase) * 1.1);
                temp.addScaledVector(ortho2, Math.cos(t * 7 + time * 1.2 + phase) * 1.1);
                temp.addScaledVector(ortho1, swirl * 0.3);

                const i3 = s * 3;
                positions[i3] = temp.x;
                positions[i3 + 1] = temp.y;
                positions[i3 + 2] = temp.z;
            }

            posAttr.needsUpdate = true;

            const hue = (hueOffset + time * 0.03) % 1;
            mesh.material.color.setHSL(hue, 0.8, 0.55);
            mesh.material.opacity = 0.55 + Math.sin(time * speed + phase) * 0.25;
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            tunnelLines.forEach(line => updateLine(line, elapsed));

            stars.rotation.y += 0.0008;
            stars.rotation.x += 0.0003;

            camera.position.z = 8 - Math.sin(elapsed * 0.1) * 1.5;
            camera.position.x = Math.sin(elapsed * 0.12) * 0.6;
            camera.position.y = Math.sin(elapsed * 0.09) * 0.4;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);
        animate();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
