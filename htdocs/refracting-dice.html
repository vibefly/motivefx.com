<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refracting Dice | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
            pointer-events: none;
        }

        #main-header,
        #main-header * {
            pointer-events: auto;
        }
        #main-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        #grid-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #cube-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
            z-index: 2;
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo" data-link-only="true">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Refracting Dice</p>
        <p class="subtitle">A candy-red dice refracts the shifting grid with beveled pips.</p>
    </div>

    <canvas id="grid-canvas"></canvas>
    <canvas id="cube-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script src="js/animations.js" defer></script>
    <script>
        (() => {
            const gridCanvas = document.getElementById('grid-canvas');
            const gridCtx = gridCanvas.getContext('2d');

            const palette = [
                '#ff6f59',
                '#f7b267',
                '#ffe66d',
                '#6bd4ff',
                '#4d9de0',
                '#8f6fff',
                '#3cd5a6',
                '#ff8fab'
            ];

            let width = 0;
            let height = 0;
            let cols = 0;
            let rows = 0;
            let colWidths = [];
            let rowHeights = [];
            let colPositions = [];
            let rowPositions = [];
            let cells = [];
            let gradient = null;

            const baseCellSize = 120;
            const minCellSize = 70;
            const maxCellSize = 190;
            const colPhases = [];
            const rowPhases = [];
            const colSpeeds = [];
            const rowSpeeds = [];

            const randFromPalette = () => palette[Math.floor(Math.random() * palette.length)];

            const buildGradient = () => {
                gradient = gridCtx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, '#10151c');
                gradient.addColorStop(0.5, '#141822');
                gradient.addColorStop(1, '#0f1218');
            };

            const createCell = (col, row) => ({
                col,
                row,
                color: randFromPalette(),
                nextColor: null,
                wipeDir: 'up',
                wipeProgress: 1,
                wipeSpeed: 0.8 + Math.random() * 1.2,
                holdTime: 0.6 + Math.random() * 1.3,
                holdTimer: 0
            });

            const setupGrid = () => {
                cols = Math.max(5, Math.floor(width / baseCellSize));
                rows = Math.max(4, Math.floor(height / baseCellSize));

                colWidths = new Array(cols).fill(baseCellSize);
                rowHeights = new Array(rows).fill(baseCellSize);
                colPositions = new Array(cols).fill(0);
                rowPositions = new Array(rows).fill(0);

                colPhases.length = cols;
                rowPhases.length = rows;
                colSpeeds.length = cols;
                rowSpeeds.length = rows;

                for (let i = 0; i < cols; i++) {
                    colPhases[i] = Math.random() * Math.PI * 2;
                    colSpeeds[i] = 1.1 + Math.random() * 1.2;
                }
                for (let j = 0; j < rows; j++) {
                    rowPhases[j] = Math.random() * Math.PI * 2;
                    rowSpeeds[j] = 1.1 + Math.random() * 1.2;
                }

                cells = [];
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        cells.push(createCell(col, row));
                    }
                }
            };

            const resizeGrid = () => {
                width = window.innerWidth;
                height = window.innerHeight;
                gridCanvas.width = Math.floor(width * window.devicePixelRatio);
                gridCanvas.height = Math.floor(height * window.devicePixelRatio);
                gridCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
                setupGrid();
                buildGradient();
            };

            const pickDirection = () => {
                const dirs = ['up', 'down', 'left', 'right'];
                return dirs[Math.floor(Math.random() * dirs.length)];
            };

            const startWipe = (cell) => {
                cell.nextColor = randFromPalette();
                if (cell.nextColor === cell.color) {
                    cell.nextColor = randFromPalette();
                }
                cell.wipeDir = pickDirection();
                cell.wipeProgress = 0;
                cell.wipeSpeed = 0.8 + Math.random() * 1.3;
            };

            const updateCell = (cell, delta) => {
                if (cell.wipeProgress < 1) {
                    cell.wipeProgress = Math.min(1, cell.wipeProgress + delta * cell.wipeSpeed);
                    if (cell.wipeProgress === 1) {
                        cell.color = cell.nextColor || cell.color;
                        cell.nextColor = null;
                        cell.holdTimer = 0;
                    }
                    return;
                }

                cell.holdTimer += delta;
                if (cell.holdTimer >= cell.holdTime) {
                    startWipe(cell);
                }
            };

            const drawCell = (cell, x, y, w, h) => {
                gridCtx.fillStyle = cell.color;
                gridCtx.fillRect(x, y, w, h);

                if (cell.wipeProgress >= 1 || !cell.nextColor) {
                    return;
                }

                const p = cell.wipeProgress;
                gridCtx.fillStyle = cell.nextColor;

                if (cell.wipeDir === 'up') {
                    const wipeH = h * p;
                    gridCtx.fillRect(x, y + h - wipeH, w, wipeH);
                } else if (cell.wipeDir === 'down') {
                    const wipeH = h * p;
                    gridCtx.fillRect(x, y, w, wipeH);
                } else if (cell.wipeDir === 'left') {
                    const wipeW = w * p;
                    gridCtx.fillRect(x + w - wipeW, y, wipeW, h);
                } else {
                    const wipeW = w * p;
                    gridCtx.fillRect(x, y, wipeW, h);
                }
            };

            const computeGrid = (time) => {
                const colCount = colWidths.length;
                const rowCount = rowHeights.length;

                let totalW = 0;
                for (let i = 0; i < colCount; i++) {
                    const scale = 0.78 + 0.28 * Math.sin(time * colSpeeds[i] + colPhases[i]);
                    colWidths[i] = Math.max(minCellSize, Math.min(maxCellSize, baseCellSize * scale));
                    totalW += colWidths[i];
                }

                let totalH = 0;
                for (let j = 0; j < rowCount; j++) {
                    const scale = 0.78 + 0.28 * Math.sin(time * rowSpeeds[j] + rowPhases[j]);
                    rowHeights[j] = Math.max(minCellSize, Math.min(maxCellSize, baseCellSize * scale));
                    totalH += rowHeights[j];
                }

                const colScale = width / totalW;
                const rowScale = height / totalH;

                let x = 0;
                for (let i = 0; i < colCount; i++) {
                    colWidths[i] *= colScale;
                    colPositions[i] = x;
                    x += colWidths[i];
                }

                let y = 0;
                for (let j = 0; j < rowCount; j++) {
                    rowHeights[j] *= rowScale;
                    rowPositions[j] = y;
                    y += rowHeights[j];
                }
            };

            const cubeCanvas = document.getElementById('cube-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas: cubeCanvas, antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.setClearColor(0x000000, 0);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20);
            camera.position.set(0, 0, 5);

            const gridTexture = new THREE.CanvasTexture(gridCanvas);
            gridTexture.encoding = THREE.sRGBEncoding;
            gridTexture.minFilter = THREE.LinearFilter;
            gridTexture.magFilter = THREE.LinearFilter;
            gridTexture.wrapS = THREE.ClampToEdgeWrapping;
            gridTexture.wrapT = THREE.ClampToEdgeWrapping;

            const renderTarget = new THREE.WebGLRenderTarget(
                window.innerWidth * window.devicePixelRatio,
                window.innerHeight * window.devicePixelRatio
            );
            renderTarget.texture.encoding = THREE.sRGBEncoding;

            const refractionScene = new THREE.Scene();
            const bgPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(1, 1),
                new THREE.MeshBasicMaterial({ map: gridTexture })
            );
            refractionScene.add(bgPlane);

            const cubeSize = 1.8;
            const cubeBevel = cubeSize / 60;
            const pipHoleRadius = cubeSize * 0.11;
            const pipInsertRadius = cubeSize * 0.095;
            const pipOffset = cubeSize * 0.23;
            const pipInset = cubeSize * 0.03;
            const pipDepth = cubeSize * 0.045;

            const outerMaterial = new THREE.ShaderMaterial({
                transparent: true,
                uniforms: {
                    uBackground: { value: renderTarget.texture },
                    uResolution: { value: new THREE.Vector2(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio) },
                    uTime: { value: 0 },
                    uLightDir: { value: new THREE.Vector3(-0.6, 0.7, 0.4).normalize() },
                    uHalfSize: { value: cubeSize * 0.5 },
                    uPipRadius: { value: pipHoleRadius },
                    uPipOffset: { value: pipOffset },
                    uPipInset: { value: pipInset },
                    uDisableHoles: { value: 0 }
                },
                depthWrite: true,
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * viewMatrix * worldPos;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D uBackground;
                    uniform vec2 uResolution;
                    uniform float uTime;
                    uniform vec3 uLightDir;
                    uniform float uHalfSize;
                    uniform float uPipRadius;
                    uniform float uPipOffset;
                    uniform float uPipInset;
                    uniform float uDisableHoles;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    float pipMask(vec2 p, vec2 c, float r) {
                        return 1.0 - smoothstep(r * 0.9, r, distance(p, c));
                    }

                    float dicePips(vec3 pos) {
                        float ax = abs(pos.x);
                        float ay = abs(pos.y);
                        float az = abs(pos.z);
                        float mask = 0.0;
                        float edge = uHalfSize - uPipInset;

                        if (ax >= ay && ax >= az) {
                            if (abs(pos.x) < edge) return 0.0;
                            vec2 p = vec2(pos.z, pos.y);
                            if (pos.x > 0.0) {
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(0.0, 0.0), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, uPipOffset), uPipRadius));
                            } else {
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, uPipOffset), uPipRadius));
                            }
                        } else if (ay >= ax && ay >= az) {
                            if (abs(pos.y) < edge) return 0.0;
                            vec2 p = vec2(pos.x, pos.z);
                            if (pos.y > 0.0) {
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, uPipOffset), uPipRadius));
                            } else {
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(0.0, 0.0), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, uPipOffset), uPipRadius));
                            }
                        } else {
                            if (abs(pos.z) < edge) return 0.0;
                            vec2 p = vec2(pos.x, pos.y);
                            if (pos.z > 0.0) {
                                mask = max(mask, pipMask(p, vec2(0.0, 0.0), uPipRadius));
                            } else {
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, -uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, 0.0), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, 0.0), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(-uPipOffset, uPipOffset), uPipRadius));
                                mask = max(mask, pipMask(p, vec2(uPipOffset, uPipOffset), uPipRadius));
                            }
                        }

                        return mask;
                    }

                    void main() {
                        float pip = dicePips(vPosition);
                        if (uDisableHoles < 0.5 && pip > 0.15) {
                            discard;
                        }
                        vec2 uv = gl_FragCoord.xy / uResolution;
                        vec3 normal = normalize(vNormal);
                        float refractStrength = 0.06 + 0.02 * sin(uTime * 0.7);
                        vec2 offset = normal.xy * refractStrength;
                        vec3 refracted = texture2D(uBackground, uv + offset).rgb;

                        float fresnel = pow(1.0 - clamp(dot(normal, vec3(0.0, 0.0, 1.0)), 0.0, 1.0), 2.0);
                        vec3 tint = vec3(0.38, 0.015, 0.04);
                        float sheen = pow(max(dot(normal, uLightDir), 0.0), 8.0) * 0.45;
                        vec3 highlight = vec3(1.0) * (fresnel * 1.1 + sheen);
                        float density = 0.25 + (1.0 - abs(normal.z)) * 0.65;
                        vec3 absorption = mix(vec3(1.0), tint * 0.6, density);
                        vec3 color = refracted * tint * absorption + highlight * 0.9;

                        float alpha = 0.9 + fresnel * 0.08;
                        gl_FragColor = vec4(color, alpha);
                    }
                `
            });

            const createRoundedBoxGeometry = (width, height, depth, radius, smoothness) => {
                const shape = new THREE.Shape();
                const eps = 0.00001;
                const radiusClamp = Math.min(radius, Math.min(width, height) * 0.5 - eps);

                shape.absarc(eps, eps, eps, -Math.PI / 2, -Math.PI, true);
                shape.absarc(eps, height - radiusClamp * 2, eps, Math.PI, Math.PI / 2, true);
                shape.absarc(width - radiusClamp * 2, height - radiusClamp * 2, eps, Math.PI / 2, 0, true);
                shape.absarc(width - radiusClamp * 2, eps, eps, 0, -Math.PI / 2, true);

                const geometry = new THREE.ExtrudeGeometry(shape, {
                    depth: depth - radiusClamp * 2,
                    bevelEnabled: true,
                    bevelSegments: smoothness * 2,
                    steps: 1,
                    bevelSize: radiusClamp - eps,
                    bevelThickness: radiusClamp,
                    curveSegments: smoothness
                });

                geometry.center();
                return geometry;
            };

            const cube = new THREE.Mesh(
                createRoundedBoxGeometry(cubeSize, cubeSize, cubeSize, cubeBevel, 8),
                outerMaterial
            );
            scene.add(cube);

            const pipMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                toneMapped: false
            });
            const pipGeometry = new THREE.CylinderGeometry(pipInsertRadius, pipInsertRadius, pipDepth * 0.9, 24, 1, false);
            const pipPos = pipGeometry.attributes.position;
            const pipHalfDepth = (pipDepth * 0.9) * 0.5;
            const concavity = pipDepth * 0.35;
            for (let i = 0; i < pipPos.count; i++) {
                const x = pipPos.getX(i);
                const y = pipPos.getY(i);
                const z = pipPos.getZ(i);
                if (y > pipHalfDepth - 1e-4) {
                    const r = Math.min(1, Math.sqrt(x * x + z * z) / pipInsertRadius);
                    const indent = (1 - r * r) * concavity;
                    pipPos.setY(i, y - indent);
                }
            }
            pipPos.needsUpdate = true;
            pipGeometry.computeVertexNormals();
            const pipWallGeometry = new THREE.CylinderGeometry(pipHoleRadius, pipHoleRadius, pipDepth, 28, 1, true);
            pipWallGeometry.scale(-1, 1, 1);
            const pipWallMaterial = outerMaterial.clone();
            pipWallMaterial.uniforms = THREE.UniformsUtils.clone(outerMaterial.uniforms);
            pipWallMaterial.uniforms.uDisableHoles.value = 1;
            const pipBevelThickness = pipHoleRadius * 0.14;
            const pipBevelGeometry = new THREE.TorusGeometry(pipHoleRadius, pipBevelThickness, 12, 36);
            const pipLayouts = {
                1: [[0, 0]],
                2: [[-pipOffset, -pipOffset], [pipOffset, pipOffset]],
                3: [[-pipOffset, -pipOffset], [0, 0], [pipOffset, pipOffset]],
                4: [[-pipOffset, -pipOffset], [pipOffset, -pipOffset], [-pipOffset, pipOffset], [pipOffset, pipOffset]],
                5: [[-pipOffset, -pipOffset], [pipOffset, -pipOffset], [0, 0], [-pipOffset, pipOffset], [pipOffset, pipOffset]],
                6: [[-pipOffset, -pipOffset], [-pipOffset, 0], [-pipOffset, pipOffset], [pipOffset, -pipOffset], [pipOffset, 0], [pipOffset, pipOffset]]
            };

            const addPip = (axis, dir, x, y) => {
                const wall = new THREE.Mesh(pipWallGeometry, pipWallMaterial);
                const bevel = new THREE.Mesh(pipBevelGeometry, pipWallMaterial);
                const pip = new THREE.Mesh(pipGeometry, pipMaterial);
                if (axis === 'z') {
                    wall.rotation.x = Math.PI / 2;
                    pip.rotation.x = Math.PI / 2;
                    wall.position.set(x, y, (cubeSize * 0.5 - pipInset - pipDepth * 0.5) * dir);
                    pip.position.set(x, y, (cubeSize * 0.5 - pipInset - pipDepth * 0.45) * dir);
                    bevel.position.set(x, y, (cubeSize * 0.5 - pipInset + pipBevelThickness) * dir);
                } else if (axis === 'y') {
                    wall.position.set(x, (cubeSize * 0.5 - pipInset - pipDepth * 0.5) * dir, y);
                    pip.position.set(x, (cubeSize * 0.5 - pipInset - pipDepth * 0.45) * dir, y);
                    bevel.position.set(x, (cubeSize * 0.5 - pipInset + pipBevelThickness) * dir, y);
                    bevel.rotation.x = dir > 0 ? -Math.PI / 2 : Math.PI / 2;
                } else {
                    wall.rotation.z = Math.PI / 2;
                    pip.rotation.z = Math.PI / 2;
                    wall.position.set((cubeSize * 0.5 - pipInset - pipDepth * 0.5) * dir, y, x);
                    pip.position.set((cubeSize * 0.5 - pipInset - pipDepth * 0.45) * dir, y, x);
                    bevel.position.set((cubeSize * 0.5 - pipInset + pipBevelThickness) * dir, y, x);
                    bevel.rotation.y = dir > 0 ? Math.PI / 2 : -Math.PI / 2;
                }
                cube.add(wall);
                cube.add(bevel);
                cube.add(pip);
            };

            [
                { axis: 'z', dir: 1, value: 1 },
                { axis: 'z', dir: -1, value: 6 },
                { axis: 'y', dir: 1, value: 2 },
                { axis: 'y', dir: -1, value: 5 },
                { axis: 'x', dir: 1, value: 3 },
                { axis: 'x', dir: -1, value: 4 }
            ].forEach((face) => {
                pipLayouts[face.value].forEach(([px, py]) => {
                    addPip(face.axis, face.dir, px, py);
                });
            });

            const resize = () => {
                resizeGrid();
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                outerMaterial.uniforms.uResolution.value.set(
                    window.innerWidth * window.devicePixelRatio,
                    window.innerHeight * window.devicePixelRatio
                );
                renderTarget.setSize(
                    window.innerWidth * window.devicePixelRatio,
                    window.innerHeight * window.devicePixelRatio
                );
                const distance = 6;
                const height = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)) * distance;
                const width = height * camera.aspect;
                bgPlane.scale.set(width, height, 1);
                bgPlane.position.z = -distance;
            };

            let lastTime = 0;
            const animate = (time) => {
                const now = time * 0.001;
                const delta = Math.min(now - lastTime, 0.05);
                lastTime = now;

                gridCtx.fillStyle = gradient;
                gridCtx.fillRect(0, 0, width, height);

                computeGrid(now);

                let cellIndex = 0;
                for (let row = 0; row < rows; row++) {
                    const y = rowPositions[row];
                    const h = rowHeights[row];
                    for (let col = 0; col < cols; col++) {
                        const x = colPositions[col];
                        const w = colWidths[col];
                        const cell = cells[cellIndex++];
                        updateCell(cell, delta);
                        drawCell(cell, x, y, w, h);
                    }
                }

                gridTexture.needsUpdate = true;
                outerMaterial.uniforms.uTime.value = now;
                cube.rotation.x = now * 0.35;
                cube.rotation.y = now * 0.55;

                renderer.setRenderTarget(renderTarget);
                renderer.clear();
                renderer.render(refractionScene, camera);
                renderer.setRenderTarget(null);
                renderer.render(scene, camera);

                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', resize);

            resize();
            requestAnimationFrame(animate);
        })();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
