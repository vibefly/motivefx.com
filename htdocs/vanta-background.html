<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emacmedia | VANTA Background</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: #000;
            font-family: var(--font-primary);
        }
        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div id="vanta-bg"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.net.min.js"></script>
    <script>
        VANTA.NET({
            el: "#vanta-bg",
            color: 0x1e90ff,
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0x000000
        });
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
