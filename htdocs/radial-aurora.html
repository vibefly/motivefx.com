<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Aurora | motiveFx</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">motiveFx</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#studies">Studies</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Radial Aurora</p>
        <p class="subtitle">Aurora-lit tubes shimmer and send sporadic light pulses outward.</p>
    </div>

    <script src="js/three.min.r134.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.055);

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 140);
        camera.position.set(0, 0, 11);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x224455, 0.7);
        scene.add(ambient);

        const core = new THREE.PointLight(0x88ddff, 2.8, 55, 2);
        core.position.set(0, 0, 0);
        scene.add(core);

        // Starfield backdrop
        const starCount = 1100;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const i3 = i * 3;
            starPositions[i3] = (Math.random() - 0.5) * 110;
            starPositions[i3 + 1] = (Math.random() - 0.5) * 110;
            starPositions[i3 + 2] = (Math.random() - 0.5) * 110;
        }
        const stars = new THREE.Points(
            new THREE.BufferGeometry().setAttribute("position", new THREE.BufferAttribute(starPositions, 3)),
            new THREE.PointsMaterial({ color: 0x66bfff, size: 0.04, transparent: true, opacity: 0.7, depthWrite: false })
        );
        scene.add(stars);

        const tubes = [];
        const tubularSegments = 70;
        const radialSegments = 10;
        const baseRadius = 0.1; // slightly thicker baseline
        const temp = new THREE.Vector3();

        function randomUnitVector() {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            temp.set(
                Math.sin(phi) * Math.cos(theta),
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi)
            );
            return temp.clone().normalize();
        }

        function createCurve() {
            const dir = randomUnitVector().normalize();
            const len = 24 + Math.random() * 22;
            const anchors = [];
            for (let i = 0; i < 6; i++) {
                const t = i / 5;
                const r = t * len;
                const swirl = Math.sin(t * Math.PI * 2) * 1.0;
                const wobble = Math.cos(t * Math.PI * 1.8) * 1.0;
                const base = dir.clone().multiplyScalar(r);
                const lateral = randomUnitVector().multiplyScalar(swirl * 0.7 + Math.random() * 0.4);
                anchors.push(base.add(lateral).addScaledVector(randomUnitVector(), wobble * 0.25));
            }
            const curve = new THREE.CatmullRomCurve3(anchors);
            curve.curveType = "centripetal";
            curve.tension = 0.68;
            return curve;
        }

        function createTube(idx) {
            const curve = createCurve();
            const geometry = new THREE.TubeGeometry(curve, tubularSegments, baseRadius, radialSegments, false);
            const basePositions = geometry.attributes.position.array.slice();
            const normals = geometry.attributes.normal.array.slice();
            const hue = idx / 140;
            const colors = new Float32Array(geometry.attributes.position.count * 3);
            geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
            const material = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0x0b1c2a,
                roughness: 0.32,
                metalness: 0.28,
                transparent: true,
                opacity: 0.85,
                vertexColors: true
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            return {
                mesh,
                basePositions,
                normals,
                baseColor: new THREE.Color().setHSL(hue, 0.75, 0.56),
                hueOffset: Math.random(),
                phase: Math.random() * Math.PI * 2,
                speed: 0.8 + Math.random() * 0.9, // faster than base, but not extra-wiggly
                pulseWidth: 0.04 + Math.random() * 0.04,
                pulseStart: -1,
                pulseDuration: 0.18 + Math.random() * 0.16,
                pulseIntensity: 0.9 + Math.random() * 0.6,
                nextPulseAt: Math.random() * 1.2
            };
        }

        const tubeCount = 140;
        for (let i = 0; i < tubeCount; i++) {
            tubes.push(createTube(i));
        }

        const clock = new THREE.Clock();

        function updateTube(tube, time) {
            const { mesh, basePositions, normals, phase, speed, hueOffset, baseColor } = tube;
            const positions = mesh.geometry.attributes.position.array;
            const posAttr = mesh.geometry.attributes.position;
            const colors = mesh.geometry.attributes.color.array;
            const colorAttr = mesh.geometry.attributes.color;
            const hue = (hueOffset + time * 0.05) % 1;

            baseColor.setHSL(hue, 0.8, 0.58);
            if (tube.pulseStart < 0 && time >= tube.nextPulseAt) {
                tube.pulseStart = time;
                tube.pulseDuration = 0.9 + Math.random() * 0.9;
                tube.pulseWidth = 0.03 + Math.random() * 0.05;
                tube.pulseIntensity = 1.3 + Math.random() * 1.1;
                tube.nextPulseAt = time + 0.4 + Math.random() * 2.0;
            }

            let pulsePos = -1;
            let pulseStrength = 0;
            if (tube.pulseStart >= 0) {
                const t = (time - tube.pulseStart) / tube.pulseDuration;
                if (t >= 1) {
                    tube.pulseStart = -1;
                } else {
                    pulsePos = t;
                    pulseStrength = tube.pulseIntensity * (1 - t * 0.25);
                }
            }

            for (let i = 0; i < positions.length; i += 3) {
                const vertIndex = i / 3;
                const along = (vertIndex / (radialSegments + 1)) / tubularSegments;

                const bulgeWave = Math.sin(time * speed + along * 14 + phase) * 0.8 +
                                  Math.sin(time * 1.8 + along * 24 + phase * 1.2) * 0.55;
                const bulge = 1 + bulgeWave * 0.55; // bigger swell than base

                const baseX = basePositions[i];
                const baseY = basePositions[i + 1];
                const baseZ = basePositions[i + 2];

                const nX = normals[i];
                const nY = normals[i + 1];
                const nZ = normals[i + 2];

                positions[i]     = baseX + nX * baseRadius * (bulge - 1);
                positions[i + 1] = baseY + nY * baseRadius * (bulge - 1);
                positions[i + 2] = baseZ + nZ * baseRadius * (bulge - 1);

                let brightness = 0.35;
                if (pulsePos >= 0) {
                    const delta = Math.abs(along - pulsePos);
                    const pulse = Math.exp(-(delta * delta) / (tube.pulseWidth * tube.pulseWidth));
                    brightness += pulse * pulseStrength;
                }

                colors[i]     = baseColor.r * brightness;
                colors[i + 1] = baseColor.g * brightness;
                colors[i + 2] = baseColor.b * brightness;
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;
            mesh.geometry.computeVertexNormals();

            mesh.material.opacity = 0.6 + Math.sin(time * speed + phase) * 0.28;
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            tubes.forEach(t => updateTube(t, elapsed));

            stars.rotation.y += 0.0007;
            stars.rotation.x += 0.0004;

            camera.position.z = 13 - Math.sin(elapsed * 0.12) * 1.4;
            camera.position.x = Math.sin(elapsed * 0.16) * 1.0;
            camera.position.y = Math.sin(elapsed * 0.12) * 0.8;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);
        animate();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
