<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Plazma | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Neon Plazma</p>
        <p class="subtitle">Fly through drifting, layered neon plazma with subtle parallax and depth haze.</p>
    </div>

    <canvas id="clouds-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById('clouds-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x060912, 0.018);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
            camera.position.z = 10;

            function makeCloudTexture() {
                const size = 256;
                const c = document.createElement('canvas');
                c.width = c.height = size;
                const ctx = c.getContext('2d');
                const g = ctx.createRadialGradient(size/2, size/2, size*0.1, size/2, size/2, size*0.5);
                g.addColorStop(0, 'rgba(120, 200, 255, 0.9)');
                g.addColorStop(0.4, 'rgba(60, 150, 255, 0.5)');
                g.addColorStop(1, 'rgba(10, 30, 60, 0)');
                ctx.fillStyle = g;
                ctx.fillRect(0,0,size,size);
                const tex = new THREE.Texture(c);
                tex.needsUpdate = true;
                return tex;
            }

            const cloudTexture = makeCloudTexture();
            const cloudMat = new THREE.PointsMaterial({
                map: cloudTexture,
                size: 28,
                transparent: true,
                depthWrite: false,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                color: new THREE.Color(0x7ce0ff)
            });

            const layerCount = 4;
            const cloudsPerLayer = 600;
            const spread = 80;
            const depth = 220;
            const layers = [];

            for (let l = 0; l < layerCount; l++) {
                const geom = new THREE.BufferGeometry();
                const positions = new Float32Array(cloudsPerLayer * 3);
                for (let i = 0; i < cloudsPerLayer; i++) {
                    positions[i*3] = (Math.random() - 0.5) * spread;
                    positions[i*3+1] = (Math.random() - 0.5) * spread * 0.55;
                    positions[i*3+2] = -Math.random() * depth;
                }
                geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const pts = new THREE.Points(geom, cloudMat.clone());
                pts.material.size *= 0.8 + l * 0.1;
                pts.position.z = -l * 12;
                scene.add(pts);
                layers.push({ mesh: pts, positions, speed: 8 + l * 2.5 });
            }

            const clock = new THREE.Clock();
            function animate() {
                const dt = clock.getDelta();
                const time = clock.elapsedTime;

                layers.forEach(layer => {
                    const mesh = layer.mesh;
                    const positions = layer.positions;
                    mesh.position.x = Math.sin(time * 0.12 + mesh.position.z * 0.02) * 6;
                    mesh.position.y = Math.sin(time * 0.18 + mesh.position.z * 0.015) * 4;

                    for (let i = 0; i < positions.count; i++) {
                        let z = positions.getZ(i) + layer.speed * dt;
                        if (z > 5) z = -depth;
                        positions.setZ(i, z);
                    }
                    positions.needsUpdate = true;
                });

                camera.position.z = 10;
                camera.lookAt(0, 0, -20);

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            const navToggle = document.querySelector('.nav-toggle');
            const mainNav = document.getElementById('main-nav');
            if (navToggle && mainNav) {
                navToggle.addEventListener('click', () => {
                    const isOpen = mainNav.classList.toggle('is-open');
                    navToggle.setAttribute('aria-expanded', String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
