<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Color Tunnel VR | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #88d6ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #c7e9ff;
        }

        .controls {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }

        .control-btn {
            padding: 0.6rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.6);
            color: #e9f7ff;
            font: 600 0.85rem var(--font-primary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Hexagon Color Tunnel VR</p>
        <p class="subtitle">Color pulses ride the hex tunnel in time.</p>
    </div>

    <div class="controls" aria-label="Tunnel controls">
        <button class="control-btn" id="toggle-tunnel">Pause Tunnel</button>
        <button class="control-btn" id="toggle-pulse">Pause Pulse</button>
    </div>

    <canvas id="tunnel-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById("tunnel-canvas");
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            const defaultPixelRatio = Math.min(1, window.devicePixelRatio);
            renderer.setPixelRatio(defaultPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType("local-floor");
            renderer.xr.addEventListener("sessionstart", () => {
                renderer.setPixelRatio(1);
            });
            renderer.xr.addEventListener("sessionend", () => {
                renderer.setPixelRatio(defaultPixelRatio);
            });

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 700);
            camera.position.set(0, 0, 0);

            const starGeometry = new THREE.BufferGeometry();
            const starCount = 2200;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starBaseColors = new Float32Array(starCount * 3);
            const starPalette = [
                new THREE.Color(0xffffff),
                new THREE.Color(0xfff2a6),
                new THREE.Color(0xff6b6b),
                new THREE.Color(0xffa94d),
                new THREE.Color(0x8bc5ff),
                new THREE.Color(0xb197ff)
            ];
            for (let i = 0; i < starCount; i++) {
                const radius = 140 + Math.random() * 140;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const idx = i * 3;
                starPositions[idx] = Math.sin(phi) * Math.cos(theta) * radius;
                starPositions[idx + 1] = Math.sin(phi) * Math.sin(theta) * radius;
                starPositions[idx + 2] = -200 - Math.random() * 400;
                const tint = starPalette[Math.floor(Math.random() * starPalette.length)];
                starBaseColors[idx] = tint.r;
                starBaseColors[idx + 1] = tint.g;
                starBaseColors[idx + 2] = tint.b;
                starColors[idx] = tint.r;
                starColors[idx + 1] = tint.g;
                starColors[idx + 2] = tint.b;
            }
            starGeometry.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute("color", new THREE.BufferAttribute(starColors, 3));
            const starMaterial = new THREE.PointsMaterial({
                color: 0x9ad9ff,
                size: 0.55,
                transparent: true,
                opacity: 1,
                vertexColors: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const stars = new THREE.Points(starGeometry, starMaterial);
            stars.renderOrder = 1;
            scene.add(stars);

            const sides = 6;
            const hexSize = 0.45;
            const columns = 18;
            const rows = 18;
            const hexWidth = hexSize * 1.5;
            const hexHeight = Math.sqrt(3) * hexSize;
            const circumference = columns * hexWidth;
            const radius = circumference / (Math.PI * 2);
            const depth = rows * hexHeight;
            const speed = 3.4;
            const bpm = 120;
            const beatInterval = 60 / bpm;
            const maxExtrude = hexSize * 0.4;

            function makeCloudTexture() {
                const size = 128;
                const canvas = document.createElement("canvas");
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext("2d");
                const gradient = ctx.createRadialGradient(
                    size * 0.5,
                    size * 0.5,
                    size * 0.1,
                    size * 0.5,
                    size * 0.5,
                    size * 0.55
                );
                gradient.addColorStop(0, "rgba(160, 220, 255, 0.6)");
                gradient.addColorStop(0.5, "rgba(90, 160, 255, 0.25)");
                gradient.addColorStop(1, "rgba(10, 20, 40, 0)");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);
                const texture = new THREE.Texture(canvas);
                texture.needsUpdate = true;
                return texture;
            }

            const cloudTexture = makeCloudTexture();
            const cloudPalette = [
                new THREE.Color(0xff7ad9),
                new THREE.Color(0x7dffb2),
                new THREE.Color(0x9e7bff),
                new THREE.Color(0x6fe1ff),
                new THREE.Color(0xff6b4a),
                new THREE.Color(0xffa94d),
                new THREE.Color(0xffe066)
            ];
            const cloudMaterial = new THREE.PointsMaterial({
                map: cloudTexture,
                size: 12,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                color: 0x9fdcff
            });
            const cloudLayers = [];
            const cloudLayerCount = 2;
            const cloudsPerLayer = 120;
            const cloudSpread = 34;
            for (let layer = 0; layer < cloudLayerCount; layer++) {
                const geom = new THREE.BufferGeometry();
                const positions = new Float32Array(cloudsPerLayer * 3);
                for (let i = 0; i < cloudsPerLayer; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * cloudSpread;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * cloudSpread * 0.6;
                    positions[i * 3 + 2] = -(Math.random() * depth + depth * 0.6);
                }
                const colors = new Float32Array(cloudsPerLayer * 3);
                const baseColors = new Float32Array(cloudsPerLayer * 3);
                geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                geom.setAttribute("color", new THREE.BufferAttribute(colors, 3));
                const points = new THREE.Points(geom, cloudMaterial.clone());
                points.material.size *= 0.9 + layer * 0.2;
                points.material.opacity = 0;
                points.renderOrder = 0;
                scene.add(points);
                for (let i = 0; i < cloudsPerLayer; i++) {
                    const tint = cloudPalette[Math.floor(Math.random() * cloudPalette.length)];
                    const idx = i * 3;
                    baseColors[idx] = tint.r;
                    baseColors[idx + 1] = tint.g;
                    baseColors[idx + 2] = tint.b;
                }
                cloudLayers.push({ points, positions, colors, baseColors, speed: 0.15 + layer * 0.08 });
            }
            let cloudOpacity = 0;

            const segmentCount = columns * rows * sides;
            const vertexCount = segmentCount * 2;
            const positions = new Float32Array(vertexCount * 3);
            const basePositions = new Float32Array(vertexCount * 3);
            const vertexHex = new Uint32Array(vertexCount);
            const hexCenters = new Float32Array(columns * rows);
            const baseX = new Float32Array(columns * rows);
            const baseY = new Float32Array(columns * rows);
            const baseZ = new Float32Array(columns * rows);
            const columnIndex = new Uint16Array(columns * rows);
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x8ed6ff,
                transparent: true,
                opacity: 0
            });
            const tunnel = new THREE.LineSegments(geometry, lineMaterial);
            scene.add(tunnel);

            const hexVerts = [
                { x: hexSize, y: 0 },
                { x: hexSize * 0.5, y: hexHeight * 0.5 },
                { x: -hexSize * 0.5, y: hexHeight * 0.5 },
                { x: -hexSize, y: 0 },
                { x: -hexSize * 0.5, y: -hexHeight * 0.5 },
                { x: hexSize * 0.5, y: -hexHeight * 0.5 }
            ];

            const pulsePalette = [
                new THREE.Color(0xff3b30),
                new THREE.Color(0x34c759),
                new THREE.Color(0xff2d55),
                new THREE.Color(0x0a84ff),
                new THREE.Color(0xff9f0a),
                new THREE.Color(0xaf52de)
            ];
            const pulseIndices = [];
            for (let i = 1; i < 5; i++) {
                pulseIndices.push(6, 6 + i + 1, 6 + i);
            }
            for (let i = 0; i < 6; i++) {
                const next = (i + 1) % 6;
                pulseIndices.push(i, next, 6 + next);
                pulseIndices.push(i, 6 + next, 6 + i);
            }
            const pulseCount = 12;
            const pulses = [];
            for (let i = 0; i < pulseCount; i++) {
                const positions = new Float32Array(12 * 3);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                geometry.setIndex(pulseIndices);
                const material = new THREE.MeshBasicMaterial({
                    color: 0x8ed6ff,
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geometry, material);
                const wirePositions = new Float32Array(18 * 2 * 3);
                const wireGeometry = new THREE.BufferGeometry();
                wireGeometry.setAttribute("position", new THREE.BufferAttribute(wirePositions, 3));
                const wireMaterial = new THREE.LineBasicMaterial({
                    color: 0x8ed6ff,
                    transparent: true,
                    opacity: 0.95
                });
                const wire = new THREE.LineSegments(wireGeometry, wireMaterial);
                scene.add(mesh);
                scene.add(wire);
                pulses.push({ mesh, wire, positions, wirePositions, hexIndex: -1, spawnTime: 0 });
            }
            function writeVertex(buffer, index, x, y, zOffset, hexIndex) {
                buffer[index] = x;
                buffer[index + 1] = y;
                buffer[index + 2] = zOffset;
                vertexHex[index / 3] = hexIndex;
            }

            function setHexSegments(buffer, startIndex, hexIndex, centerZ, centerArc) {
                hexCenters[hexIndex] = centerZ;
                const worldVerts = [];
                for (let i = 0; i < sides; i++) {
                    const vertex = hexVerts[i];
                    const arc = centerArc + vertex.x;
                    const angle = arc / radius;
                    const world = {
                        x: Math.cos(angle) * radius,
                        y: Math.sin(angle) * radius
                    };
                    worldVerts.push({
                        x: world.x,
                        y: world.y,
                        zOffset: vertex.y
                    });
                }

                let pointer = startIndex;
                for (let i = 0; i < sides; i++) {
                    const curr = worldVerts[i];
                    const next = worldVerts[(i + 1) % sides];
                    writeVertex(buffer, pointer, curr.x, curr.y, curr.zOffset, hexIndex);
                    writeVertex(buffer, pointer + 3, next.x, next.y, next.zOffset, hexIndex);
                    pointer += 6;
                }
            }

            let segmentIndex = 0;
            let hexIndex = 0;
            for (let q = 0; q < columns; q++) {
                const columnOffset = (q % 2) * 0.5;
                const centerArc = q * hexWidth;
                const angle = centerArc / radius;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                for (let r = 0; r < rows; r++) {
                    const z = -(hexHeight * (r + columnOffset)) + depth * 0.5;
                    setHexSegments(basePositions, segmentIndex, hexIndex, z, centerArc);
                    baseX[hexIndex] = x;
                    baseY[hexIndex] = y;
                    baseZ[hexIndex] = z;
                    columnIndex[hexIndex] = q;
                    segmentIndex += sides * 6;
                    hexIndex += 1;
                }
            }

            const clock = new THREE.Clock();
            let travelOffset = 0;
            let beatTime = 0;
            let tunnelRunning = true;
            let pulseRunning = true;
            const targetZ = -depth * 0.5;
            let activePulseSlot = 0;
            let lastBeatIndex = -1;
            const normal = new THREE.Vector3();
            const up = new THREE.Vector3(0, 0, 1);
            const starDrift = starPositions.slice();
            const cloudColor = new THREE.Color(0x9fdcff);

            function smoothstep(edge0, edge1, x) {
                const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
                return t * t * (3 - 2 * t);
            }

            function animate() {
                const dt = clock.getDelta();
                if (tunnelRunning) {
                    travelOffset = (travelOffset + dt * speed) % depth;
                }
                if (pulseRunning) {
                    beatTime += dt;
                }
                const beatIndex = Math.floor(beatTime / beatInterval);
                const beatPhase = (beatTime / beatInterval) - beatIndex;
                const beatPulse = Math.pow(1 - beatPhase, 2);

                const travel = travelOffset;
                for (let i = 0; i < vertexCount; i++) {
                    const baseIndex = i * 3;
                    positions[baseIndex] = basePositions[baseIndex];
                    positions[baseIndex + 1] = basePositions[baseIndex + 1];
                    const centerZ = hexCenters[vertexHex[i]] + travel;
                    const wrappedCenter = ((centerZ + depth * 0.5) % depth) - depth * 0.5;
                    positions[baseIndex + 2] = wrappedCenter + basePositions[baseIndex + 2];
                }
                tunnel.geometry.attributes.position.needsUpdate = true;

                for (let i = 0; i < starPositions.length; i += 3) {
                    starPositions[i + 2] += speed * dt * 0.2;
                    if (starPositions[i + 2] > -40) {
                        starPositions[i] = (Math.random() - 0.5) * 200;
                        starPositions[i + 1] = (Math.random() - 0.5) * 200;
                        starPositions[i + 2] = -200 - Math.random() * 400;
                        const tint = starPalette[Math.floor(Math.random() * starPalette.length)];
                        starBaseColors[i] = tint.r;
                        starBaseColors[i + 1] = tint.g;
                        starBaseColors[i + 2] = tint.b;
                    }
                    const z = starPositions[i + 2];
                    const fadeIn = smoothstep(-600, -200, z);
                    const fadeOut = 1 - smoothstep(-80, -40, z);
                    const alpha = Math.min(1, fadeIn * fadeOut * 2.0);
                    starColors[i] = starBaseColors[i] * alpha;
                    starColors[i + 1] = starBaseColors[i + 1] * alpha;
                    starColors[i + 2] = starBaseColors[i + 2] * alpha;
                }
                stars.geometry.attributes.position.needsUpdate = true;
                stars.geometry.attributes.color.needsUpdate = true;

                cloudOpacity = Math.min(0.35, cloudOpacity + dt * 0.08);
                for (let i = 0; i < cloudLayers.length; i++) {
                    const layer = cloudLayers[i];
                    layer.points.material.opacity = cloudOpacity;
                    for (let j = 0; j < layer.positions.length; j += 3) {
                        let z = layer.positions[j + 2] + layer.speed * dt;
                        if (z > -depth * 0.2) {
                            z = -depth * 1.6;
                        }
                        layer.positions[j + 2] = z;
                        const fadeIn = smoothstep(-depth * 1.6, -depth * 1.1, z);
                        const fadeOut = 1 - smoothstep(-depth * 0.4, -depth * 0.2, z);
                        const alpha = fadeIn * fadeOut * 0.2;
                        const colorIndex = j;
                        layer.colors[colorIndex] = layer.baseColors[colorIndex] * alpha;
                        layer.colors[colorIndex + 1] = layer.baseColors[colorIndex + 1] * alpha;
                        layer.colors[colorIndex + 2] = layer.baseColors[colorIndex + 2] * alpha;
                    }
                    layer.points.geometry.attributes.position.needsUpdate = true;
                    layer.points.geometry.attributes.color.needsUpdate = true;
                }

                if (beatIndex !== lastBeatIndex) {
                    lastBeatIndex = beatIndex;
                    const picks = [];
                    const targetCandidates = [];
                    for (let i = 0; i < baseZ.length; i++) {
                        const centerZ = baseZ[i] + travel;
                        const wrappedZ = ((centerZ + depth * 0.5) % depth) - depth * 0.5;
                        const dist = Math.abs(wrappedZ - targetZ);
                        if (dist < hexHeight * 0.6) {
                            targetCandidates.push(i);
                        }
                    }
                    const desiredCount = 2 + Math.floor(Math.random() * 3);
                    const pickCount = Math.min(desiredCount, targetCandidates.length);
                    while (picks.length < pickCount && targetCandidates.length > 0) {
                        const idx = Math.floor(Math.random() * targetCandidates.length);
                        picks.push(targetCandidates.splice(idx, 1)[0]);
                    }
                    for (let i = 0; i < picks.length; i++) {
                        pulses[activePulseSlot].hexIndex = picks[i];
                        pulses[activePulseSlot].spawnTime = beatTime;
                        const color = pulsePalette[(beatIndex + i) % pulsePalette.length];
                        pulses[activePulseSlot].mesh.material.color.copy(color);
                        pulses[activePulseSlot].wire.material.color.copy(color);
                        activePulseSlot = (activePulseSlot + 1) % pulseCount;
                    }
                }

                pulses.forEach((pulse) => {
                    if (pulse.hexIndex < 0) {
                        pulse.mesh.visible = false;
                        pulse.wire.visible = false;
                        return;
                    }
                    const age = beatTime - pulse.spawnTime;
                    const ramp = Math.min(age / 0.25, 1);
                    const dim = Math.max(0.35, 1 - age * 0.12);
                    const intensity = ramp * dim;
                    pulse.mesh.visible = true;
                    pulse.wire.visible = true;
                    const centerArc = columnIndex[pulse.hexIndex] * hexWidth;
                    normal.set(baseX[pulse.hexIndex], baseY[pulse.hexIndex], 0).normalize();
                    const centerZ = baseZ[pulse.hexIndex] + travel;
                    const wrappedZ = ((centerZ + depth * 0.5) % depth) - depth * 0.5;
                    const extrudeDepth = maxExtrude * intensity;
                    for (let i = 0; i < 6; i++) {
                        const vertex = hexVerts[i];
                        const arc = centerArc + vertex.x;
                        const angle = arc / radius;
                        const vx = Math.cos(angle) * radius;
                        const vy = Math.sin(angle) * radius;
                        const vz = wrappedZ + vertex.y;
                        const topIndex = i * 3;
                        pulse.positions[topIndex] = vx;
                        pulse.positions[topIndex + 1] = vy;
                        pulse.positions[topIndex + 2] = vz;
                        const bottomIndex = (6 + i) * 3;
                        pulse.positions[bottomIndex] = vx - normal.x * extrudeDepth;
                        pulse.positions[bottomIndex + 1] = vy - normal.y * extrudeDepth;
                        pulse.positions[bottomIndex + 2] = vz;
                    }
                    pulse.mesh.geometry.attributes.position.needsUpdate = true;

                    let pointer = 0;
                    for (let i = 0; i < 6; i++) {
                        const next = (i + 1) % 6;
                        const a = i * 3;
                        const b = next * 3;
                        pulse.wirePositions[pointer++] = pulse.positions[a];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 2];
                        pulse.wirePositions[pointer++] = pulse.positions[b];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 2];
                    }
                    for (let i = 0; i < 6; i++) {
                        const next = (i + 1) % 6;
                        const a = (6 + i) * 3;
                        const b = (6 + next) * 3;
                        pulse.wirePositions[pointer++] = pulse.positions[a];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 2];
                        pulse.wirePositions[pointer++] = pulse.positions[b];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 2];
                    }
                    for (let i = 0; i < 6; i++) {
                        const a = i * 3;
                        const b = (6 + i) * 3;
                        pulse.wirePositions[pointer++] = pulse.positions[a];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[a + 2];
                        pulse.wirePositions[pointer++] = pulse.positions[b];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 1];
                        pulse.wirePositions[pointer++] = pulse.positions[b + 2];
                    }
                    pulse.wire.geometry.attributes.position.needsUpdate = true;
                    pulse.mesh.material.opacity = 0.9 * intensity;
                    pulse.wire.material.opacity = 0.95 * intensity;
                });

                if (!renderer.xr.isPresenting) {
                    camera.lookAt(0, 0, -2);
                }

                renderer.render(scene, camera);
            }
            renderer.setAnimationLoop(animate);

            const toggleTunnel = document.getElementById("toggle-tunnel");
            const togglePulse = document.getElementById("toggle-pulse");
            if (toggleTunnel) {
                toggleTunnel.addEventListener("click", () => {
                    tunnelRunning = !tunnelRunning;
                    toggleTunnel.textContent = tunnelRunning ? "Pause Tunnel" : "Start Tunnel";
                });
            }
            if (togglePulse) {
                togglePulse.addEventListener("click", () => {
                    pulseRunning = !pulseRunning;
                    togglePulse.textContent = pulseRunning ? "Pause Pulse" : "Start Pulse";
                });
            }

            window.addEventListener("resize", () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            function createVRButton(rendererInstance) {
                const button = document.createElement("button");
                button.style.position = "fixed";
                button.style.right = "20px";
                button.style.bottom = "20px";
                button.style.padding = "0.8rem 1.2rem";
                button.style.border = "1px solid rgba(255, 255, 255, 0.4)";
                button.style.borderRadius = "4px";
                button.style.background = "rgba(0, 0, 0, 0.6)";
                button.style.color = "#e9f7ff";
                button.style.font = "600 0.9rem var(--font-primary)";
                button.style.letterSpacing = "0.08em";
                button.style.textTransform = "uppercase";
                button.style.cursor = "pointer";
                button.style.zIndex = "999";
                button.textContent = "Enter VR";

                if (!("xr" in navigator)) {
                    button.textContent = "VR Not Supported";
                    button.style.cursor = "default";
                    button.disabled = true;
                    return button;
                }

                let currentSession = null;

                function onSessionEnded() {
                    currentSession = null;
                    button.textContent = "Enter VR";
                }

                async function onSessionStarted(session) {
                    currentSession = session;
                    session.addEventListener("end", onSessionEnded);
                    await rendererInstance.xr.setSession(session);
                    button.textContent = "Exit VR";
                }

                navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
                    if (!supported) {
                        button.textContent = "VR Not Supported";
                        button.style.cursor = "default";
                        button.disabled = true;
                        return;
                    }

                    button.addEventListener("click", () => {
                        if (currentSession === null) {
                            navigator.xr.requestSession("immersive-vr", {
                                optionalFeatures: ["local-floor", "bounded-floor"]
                            }).then(onSessionStarted);
                        } else {
                            currentSession.end();
                        }
                    });
                });

                return button;
            }

            document.body.appendChild(createVRButton(renderer));
        })();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
