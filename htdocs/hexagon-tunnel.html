<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Tunnel | motiveFx</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #88d6ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #c7e9ff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">motiveFx</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#studies">Studies</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Hexagon Tunnel</p>
        <p class="subtitle">Wireframe hex rings stream past in a star-filled void.</p>
    </div>

    <script src="js/three.min.r134.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.06);

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 120);
        camera.position.set(0, 0, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const i3 = i * 3;
            starPositions[i3] = (Math.random() - 0.5) * 120;
            starPositions[i3 + 1] = (Math.random() - 0.5) * 120;
            starPositions[i3 + 2] = (Math.random() - 0.5) * 120;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(
            starGeo,
            new THREE.PointsMaterial({ color: 0x7fc7ff, size: 0.05, transparent: true, opacity: 0.6, depthWrite: false })
        );
        scene.add(stars);

        const sides = 6;
        const hexSize = 0.45;
        const columns = 22;
        const rows = 90;
        const hexWidth = hexSize * 1.5;
        const hexHeight = Math.sqrt(3) * hexSize;
        const circumference = columns * hexWidth;
        const radius = circumference / (Math.PI * 2);
        const depth = (rows + 0.5) * hexHeight;
        const speed = 3.8;

        const segmentCount = columns * rows * sides;
        const vertexCount = segmentCount * 2;
        const positions = new Float32Array(vertexCount * 3);
        const basePositions = new Float32Array(vertexCount * 3);
        const vertexHex = new Uint32Array(vertexCount);
        const hexCenters = new Float32Array(columns * rows);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x8ed6ff,
            transparent: true,
            opacity: 0.85
        });
        const tunnel = new THREE.LineSegments(geometry, lineMaterial);
        scene.add(tunnel);

        const hexVerts = [
            { x: hexSize, y: 0 },
            { x: hexSize * 0.5, y: hexHeight * 0.5 },
            { x: -hexSize * 0.5, y: hexHeight * 0.5 },
            { x: -hexSize, y: 0 },
            { x: -hexSize * 0.5, y: -hexHeight * 0.5 },
            { x: hexSize * 0.5, y: -hexHeight * 0.5 }
        ];

        function writeVertex(buffer, index, x, y, zOffset, hexIndex) {
            buffer[index] = x;
            buffer[index + 1] = y;
            buffer[index + 2] = zOffset;
            vertexHex[index / 3] = hexIndex;
        }

        function setHexSegments(buffer, startIndex, hexIndex, centerZ, centerArc) {
            hexCenters[hexIndex] = centerZ;
            const worldVerts = [];
            for (let i = 0; i < sides; i++) {
                const vertex = hexVerts[i];
                const arc = centerArc + vertex.x;
                const angle = arc / radius;
                const world = {
                    x: Math.cos(angle) * radius,
                    y: Math.sin(angle) * radius
                };
                worldVerts.push({
                    x: world.x,
                    y: world.y,
                    zOffset: vertex.y
                });
            }

            let pointer = startIndex;
            for (let i = 0; i < sides; i++) {
                const curr = worldVerts[i];
                const next = worldVerts[(i + 1) % sides];
                writeVertex(buffer, pointer, curr.x, curr.y, curr.zOffset, hexIndex);
                writeVertex(buffer, pointer + 3, next.x, next.y, next.zOffset, hexIndex);
                pointer += 6;
            }
        }

        let segmentIndex = 0;
        let hexIndex = 0;
        for (let q = 0; q < columns; q++) {
            const columnOffset = (q % 2) * 0.5;
            const centerArc = q * hexWidth;
            for (let r = 0; r < rows; r++) {
                const z = -(hexHeight * (r + columnOffset)) + depth * 0.5;
                setHexSegments(basePositions, segmentIndex, hexIndex, z, centerArc);
                segmentIndex += sides * 6;
                hexIndex += 1;
            }
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            const travel = (elapsed * speed) % depth;
            for (let i = 0; i < vertexCount; i++) {
                const baseIndex = i * 3;
                positions[baseIndex] = basePositions[baseIndex];
                positions[baseIndex + 1] = basePositions[baseIndex + 1];
                const centerZ = hexCenters[vertexHex[i]] + travel;
                const wrappedCenter = ((centerZ + depth * 0.5) % depth) - depth * 0.5;
                positions[baseIndex + 2] = wrappedCenter + basePositions[baseIndex + 2];
            }
            tunnel.geometry.attributes.position.needsUpdate = true;

            stars.rotation.y += 0.0008;
            stars.rotation.x += 0.0003;

            camera.position.x = Math.sin(elapsed * 0.15) * 0.5;
            camera.position.y = Math.cos(elapsed * 0.12) * 0.3;
            camera.lookAt(0, 0, -2);

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);
        animate();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
