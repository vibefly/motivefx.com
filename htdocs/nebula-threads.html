<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Threads | motiveFx</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #8fe8ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #bfeeff;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <p class="title">Nebula Threads</p>
        <p class="subtitle">Filaments of light twist through a drifting aurora shell.</p>
    </div>

    <script src="js/three.min.r134.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.06);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 120);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x224455, 0.7);
        scene.add(ambient);

        const core = new THREE.PointLight(0x88ddff, 2.4, 40, 2);
        core.position.set(0, 0, 0);
        scene.add(core);

        // Soft aurora shell
        const shellGeo = new THREE.IcosahedronGeometry(6.5, 3);
        const shellMat = new THREE.MeshBasicMaterial({
            color: 0x163347,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });
        const shell = new THREE.Mesh(shellGeo, shellMat);
        scene.add(shell);

        // Starfield
        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const i3 = i * 3;
            starPositions[i3] = (Math.random() - 0.5) * 120;
            starPositions[i3 + 1] = (Math.random() - 0.5) * 120;
            starPositions[i3 + 2] = (Math.random() - 0.5) * 120;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(
            starGeo,
            new THREE.PointsMaterial({ color: 0x66bfff, size: 0.04, transparent: true, opacity: 0.7, depthWrite: false })
        );
        scene.add(stars);

        // Thread generation
        const threads = [];
        const threadCount = 160;
        const segments = 90;
        const temp = new THREE.Vector3();

        function randomUnitVector() {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            temp.set(
                Math.sin(phi) * Math.cos(theta),
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi)
            );
            return temp.clone().normalize();
        }

        function createThread(idx) {
            const dir = randomUnitVector();
            const ortho1 = randomUnitVector().cross(dir).normalize();
            const ortho2 = dir.clone().cross(ortho1).normalize();

            const positions = new Float32Array((segments + 1) * 3);
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

            const mat = new THREE.LineBasicMaterial({
                color: new THREE.Color().setHSL(idx / threadCount, 0.75, 0.55),
                transparent: true,
                opacity: 0.85
            });

            const line = new THREE.Line(geometry, mat);
            scene.add(line);

            return {
                line,
                positions,
                dir,
                ortho1,
                ortho2,
                phase: Math.random() * Math.PI * 2,
                speed: 0.6 + Math.random() * 0.8,
                length: 20 + Math.random() * 18,
                hueOffset: Math.random()
            };
        }

        for (let i = 0; i < threadCount; i++) {
            threads.push(createThread(i));
        }

        const clock = new THREE.Clock();

        function updateThread(thread, time) {
            const { line, positions, dir, ortho1, ortho2, phase, speed, length, hueOffset } = thread;
            const posAttr = line.geometry.attributes.position;

            for (let s = 0; s <= segments; s++) {
                const t = s / segments;
                const radial = t * length + Math.sin(time * 0.5 + t * 8 + phase) * 1.1;
                const swirl = Math.sin(time * 1.2 + t * 10 + phase * 1.3) * 1.2;
                const wobble = Math.sin(time * 0.9 + t * 6 + phase * 0.7) * 0.8;

                temp.copy(dir).multiplyScalar(radial);
                temp.addScaledVector(ortho1, Math.sin(t * 11 + time * 1.5 + phase) * 1.4 + swirl * 0.3);
                temp.addScaledVector(ortho2, Math.cos(t * 9 + time * 1.3 + phase) * 1.4 + wobble * 0.3);

                const i3 = s * 3;
                positions[i3] = temp.x;
                positions[i3 + 1] = temp.y;
                positions[i3 + 2] = temp.z;
            }

            posAttr.needsUpdate = true;

            const hue = (hueOffset + time * 0.04) % 1;
            line.material.color.setHSL(hue, 0.8, 0.6);
            line.material.opacity = 0.55 + Math.sin(time * speed + phase) * 0.25;
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            threads.forEach(t => updateThread(t, elapsed));

            shell.rotation.y += 0.0009;
            shell.rotation.x += 0.0004;
            stars.rotation.y += 0.0006;

            camera.position.z = 10 - Math.sin(elapsed * 0.12) * 2.0;
            camera.position.x = Math.sin(elapsed * 0.14) * 0.9;
            camera.position.y = Math.sin(elapsed * 0.1) * 0.7;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);
        animate();
    </script>
</body>
</html>
