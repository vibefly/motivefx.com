<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Tunnel VR | emacmedia</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: var(--font-primary);
            color: #e9f7ff;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            padding: 22px;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
        }

        .title {
            margin: 0 0 6px 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: clamp(18px, 3vw, 26px);
            color: #88d6ff;
        }

        .subtitle {
            margin: 0;
            font-size: clamp(14px, 2.3vw, 17px);
            color: #c7e9ff;
        }
    </style>
</head>
<body class="static-page vis-page">
    <header id="main-header">
        <a href="index.html" class="logo">emacmedia</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Toggle navigation</span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav id="main-nav">
            <ul>
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#experiments">Experiments</a></li>
                <li><a href="index.html#notes">Notes</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="overlay">
        <p class="title">Hexagon Tunnel VR</p>
        <p class="subtitle">Wireframe hex rings stream past in a deep void.</p>
    </div>

    <canvas id="tunnel-canvas"></canvas>

    <script src="js/three.min.r134.js"></script>
    <script>
        (() => {
            const canvas = document.getElementById("tunnel-canvas");
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            const defaultPixelRatio = Math.min(1, window.devicePixelRatio);
            renderer.setPixelRatio(defaultPixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType("local-floor");
            renderer.xr.addEventListener("sessionstart", () => {
                renderer.setPixelRatio(1);
            });
            renderer.xr.addEventListener("sessionend", () => {
                renderer.setPixelRatio(defaultPixelRatio);
            });

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.12);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 80);
            camera.position.set(0, 0, 6);

            const sides = 6;
            const hexSize = 0.45;
            const columns = 18;
            const rows = 30;
            const hexWidth = hexSize * 1.5;
            const hexHeight = Math.sqrt(3) * hexSize;
            const circumference = columns * hexWidth;
            const radius = circumference / (Math.PI * 2);
            const depth = rows * hexHeight;
            const speed = 3.4;

            const segmentCount = columns * rows * sides;
            const vertexCount = segmentCount * 2;
            const positions = new Float32Array(vertexCount * 3);
            const basePositions = new Float32Array(vertexCount * 3);
            const vertexHex = new Uint32Array(vertexCount);
            const hexCenters = new Float32Array(columns * rows);
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x8ed6ff,
                transparent: true,
                opacity: 0.85
            });
            const tunnel = new THREE.LineSegments(geometry, lineMaterial);
            scene.add(tunnel);

            const hexVerts = [
                { x: hexSize, y: 0 },
                { x: hexSize * 0.5, y: hexHeight * 0.5 },
                { x: -hexSize * 0.5, y: hexHeight * 0.5 },
                { x: -hexSize, y: 0 },
                { x: -hexSize * 0.5, y: -hexHeight * 0.5 },
                { x: hexSize * 0.5, y: -hexHeight * 0.5 }
            ];

            function writeVertex(buffer, index, x, y, zOffset, hexIndex) {
                buffer[index] = x;
                buffer[index + 1] = y;
                buffer[index + 2] = zOffset;
                vertexHex[index / 3] = hexIndex;
            }

            function setHexSegments(buffer, startIndex, hexIndex, centerZ, centerArc) {
                hexCenters[hexIndex] = centerZ;
                const worldVerts = [];
                for (let i = 0; i < sides; i++) {
                    const vertex = hexVerts[i];
                    const arc = centerArc + vertex.x;
                    const angle = arc / radius;
                    const world = {
                        x: Math.cos(angle) * radius,
                        y: Math.sin(angle) * radius
                    };
                    worldVerts.push({
                        x: world.x,
                        y: world.y,
                        zOffset: vertex.y
                    });
                }

                let pointer = startIndex;
                for (let i = 0; i < sides; i++) {
                    const curr = worldVerts[i];
                    const next = worldVerts[(i + 1) % sides];
                    writeVertex(buffer, pointer, curr.x, curr.y, curr.zOffset, hexIndex);
                    writeVertex(buffer, pointer + 3, next.x, next.y, next.zOffset, hexIndex);
                    pointer += 6;
                }
            }

            let segmentIndex = 0;
            let hexIndex = 0;
            for (let q = 0; q < columns; q++) {
                const columnOffset = (q % 2) * 0.5;
                const centerArc = q * hexWidth;
                for (let r = 0; r < rows; r++) {
                    const z = -(hexHeight * (r + columnOffset)) + depth * 0.5;
                    setHexSegments(basePositions, segmentIndex, hexIndex, z, centerArc);
                    segmentIndex += sides * 6;
                    hexIndex += 1;
                }
            }

            const clock = new THREE.Clock();

            function animate() {
                const elapsed = clock.getElapsedTime();

                const travel = (elapsed * speed) % depth;
                for (let i = 0; i < vertexCount; i++) {
                    const baseIndex = i * 3;
                    positions[baseIndex] = basePositions[baseIndex];
                    positions[baseIndex + 1] = basePositions[baseIndex + 1];
                    const centerZ = hexCenters[vertexHex[i]] + travel;
                    const wrappedCenter = ((centerZ + depth * 0.5) % depth) - depth * 0.5;
                    positions[baseIndex + 2] = wrappedCenter + basePositions[baseIndex + 2];
                }
                tunnel.geometry.attributes.position.needsUpdate = true;

                if (!renderer.xr.isPresenting) {
                    camera.lookAt(0, 0, -2);
                }

                renderer.render(scene, camera);
            }
            renderer.setAnimationLoop(animate);

            window.addEventListener("resize", () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            function createVRButton(rendererInstance) {
                const button = document.createElement("button");
                button.style.position = "fixed";
                button.style.right = "20px";
                button.style.bottom = "20px";
                button.style.padding = "0.8rem 1.2rem";
                button.style.border = "1px solid rgba(255, 255, 255, 0.4)";
                button.style.borderRadius = "4px";
                button.style.background = "rgba(0, 0, 0, 0.6)";
                button.style.color = "#e9f7ff";
                button.style.font = "600 0.9rem var(--font-primary)";
                button.style.letterSpacing = "0.08em";
                button.style.textTransform = "uppercase";
                button.style.cursor = "pointer";
                button.style.zIndex = "999";
                button.textContent = "Enter VR";

                if (!("xr" in navigator)) {
                    button.textContent = "VR Not Supported";
                    button.style.cursor = "default";
                    button.disabled = true;
                    return button;
                }

                let currentSession = null;

                function onSessionEnded() {
                    currentSession = null;
                    button.textContent = "Enter VR";
                }

                async function onSessionStarted(session) {
                    currentSession = session;
                    session.addEventListener("end", onSessionEnded);
                    await rendererInstance.xr.setSession(session);
                    button.textContent = "Exit VR";
                }

                navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
                    if (!supported) {
                        button.textContent = "VR Not Supported";
                        button.style.cursor = "default";
                        button.disabled = true;
                        return;
                    }

                    button.addEventListener("click", () => {
                        if (currentSession === null) {
                            navigator.xr.requestSession("immersive-vr", {
                                optionalFeatures: ["local-floor", "bounded-floor"]
                            }).then(onSessionStarted);
                        } else {
                            currentSession.end();
                        }
                    });
                });

                return button;
            }

            document.body.appendChild(createVRButton(renderer));
        })();
    </script>
    <script>
        (() => {
            const navToggle = document.querySelector(".nav-toggle");
            const mainNav = document.getElementById("main-nav");
            if (navToggle && mainNav) {
                navToggle.addEventListener("click", () => {
                    const isOpen = mainNav.classList.toggle("is-open");
                    navToggle.setAttribute("aria-expanded", String(isOpen));
                });
            }
        })();
    </script>
</body>
</html>
